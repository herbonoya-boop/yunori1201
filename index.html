<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인재육성팀 윷놀이 - 온라인</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5ede0;--board:#fdf6e8;--wood:#b8864e;--wood-d:#7a5230;--wood-l:#e8d0a8;
  --line:#c8a878;--text:#3a2010;--muted:#9e7a50;--sh:rgba(0,0,0,0.13);
  --green:#4caf6e;--red:#e8534a;--yellow:#f5c842;--blue:#4a8fd9;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse at 20% 20%,rgba(184,134,78,.15) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 80%,rgba(76,175,110,.1) 0%,transparent 55%);
  font-family:'Noto Sans KR',sans-serif;color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:16px 12px 40px;
}
h1{font-family:'Jua',sans-serif;font-size:clamp(20px,4vw,34px);color:var(--wood-d);margin-bottom:2px;text-align:center;}
.sub{color:var(--muted);font-size:13px;margin-bottom:16px;text-align:center;}

/* ── LOBBY SCREEN ── */
#lobbyScreen{width:100%;max-width:500px;}
.lobby-panel{background:white;border:2px solid var(--wood-l);border-radius:16px;padding:24px;box-shadow:0 4px 20px var(--sh);margin-bottom:16px;text-align:center;}
.lobby-title{font-family:'Jua',sans-serif;font-size:22px;color:var(--wood-d);margin-bottom:20px;}
.lobby-subtitle{font-size:14px;color:var(--muted);margin-bottom:16px;}
.lobby-input{width:100%;border:2px solid var(--wood-l);border-radius:10px;padding:14px;font-family:'Noto Sans KR',sans-serif;font-size:16px;outline:none;color:var(--text);background:#fffdf8;transition:border-color .2s;margin-bottom:12px;text-align:center;}
.lobby-input:focus{border-color:var(--wood);}
.lobby-input.room-code{font-family:'Jua',sans-serif;font-size:24px;letter-spacing:4px;text-transform:uppercase;}
.btn-lobby{
  width:100%;background:linear-gradient(135deg,var(--yellow),#e6b000);
  color:var(--text);border:none;border-radius:12px;padding:16px;
  font-family:'Jua',sans-serif;font-size:18px;cursor:pointer;
  box-shadow:0 4px 14px rgba(245,200,66,.4);transition:transform .15s,opacity .15s;
  margin-bottom:10px;
}
.btn-lobby:hover:not(:disabled){transform:translateY(-2px);}
.btn-lobby:disabled{opacity:.5;cursor:not-allowed;}
.btn-lobby.secondary{background:linear-gradient(135deg,var(--wood-l),var(--wood));color:white;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:13px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--wood-l);}
.error-msg{color:var(--red);font-size:13px;margin-top:8px;min-height:20px;}
.room-info{background:#f0fff4;border:2px solid var(--green);border-radius:12px;padding:16px;margin-bottom:16px;}
.room-code-display{font-family:'Jua',sans-serif;font-size:36px;letter-spacing:6px;color:var(--wood-d);}
.room-code-label{font-size:12px;color:var(--muted);margin-bottom:4px;}
.copy-btn{background:var(--green);color:white;border:none;border-radius:6px;padding:6px 14px;font-family:'Jua',sans-serif;font-size:12px;cursor:pointer;margin-top:8px;}
.copy-btn:hover{opacity:.8;}
.player-wait-list{text-align:left;margin-top:16px;}
.player-wait-item{display:flex;align-items:center;gap:10px;padding:10px;background:#fffdf8;border-radius:8px;margin-bottom:8px;border:1px solid var(--wood-l);}
.player-wait-item.me{border-color:var(--yellow);background:#fffbef;}
.pwi-emoji{font-size:24px;}
.pwi-name{font-family:'Jua',sans-serif;font-size:15px;}
.pwi-host{font-size:10px;background:var(--yellow);color:var(--text);padding:2px 6px;border-radius:4px;margin-left:auto;}
.waiting-msg{color:var(--muted);font-size:13px;margin-top:12px;}

/* ── SETUP SCREEN ── */
#setupScreen{display:none;width:100%;max-width:600px;}
.setup-panel{background:white;border:2px solid var(--wood-l);border-radius:16px;padding:20px;box-shadow:0 4px 20px var(--sh);margin-bottom:16px;}
.setup-title{font-family:'Jua',sans-serif;font-size:18px;color:var(--wood-d);margin-bottom:14px;text-align:center;}
.piece-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:14px;}
.piece-btn{
  background:#fffdf8;border:2px solid var(--wood-l);border-radius:10px;
  padding:10px 4px;text-align:center;cursor:pointer;transition:all .15s;
}
.piece-btn:hover:not(.taken){border-color:var(--wood);background:#fdf0d8;}
.piece-btn.selected{border-color:var(--yellow);background:#fffbef;box-shadow:0 0 0 2px var(--yellow);}
.piece-btn.taken{opacity:.35;cursor:not-allowed;background:#f0f0f0;}
.piece-emoji{font-size:28px;display:block;margin-bottom:3px;}
.piece-name{font-family:'Jua',sans-serif;font-size:11px;color:var(--muted);}
.piece-owner{font-size:10px;color:var(--wood-d);margin-top:2px;}
.btn-confirm{
  width:100%;background:linear-gradient(135deg,var(--yellow),#e6b000);
  color:var(--text);border:none;border-radius:10px;padding:13px;
  font-family:'Jua',sans-serif;font-size:17px;cursor:pointer;
  box-shadow:0 4px 14px rgba(245,200,66,.4);transition:transform .15s,opacity .15s;
}
.btn-confirm:hover:not(:disabled){transform:translateY(-2px);}
.btn-confirm:disabled{opacity:.35;cursor:not-allowed;}
.player-slots{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.slot{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;border:2px solid #f0e4cc;background:#fafafa;}
.slot.me{border-color:var(--yellow);background:#fffbef;}
.slot-emoji{font-size:22px;}
.slot-name{font-family:'Jua',sans-serif;font-size:14px;}
.slot-ready{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:auto;}
.slot-ready.yes{background:var(--green);color:white;}
.slot-ready.no{background:#ddd;color:#888;}
.slot-empty{color:var(--muted);font-size:13px;}

/* ── GAME SCREEN ── */
#gameScreen{display:none;width:100%;max-width:1060px;}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:8px 12px;background:white;border-radius:10px;border:1px solid var(--wood-l);}
.game-room-code{font-family:'Jua',sans-serif;font-size:14px;color:var(--muted);}
.game-room-code span{color:var(--wood-d);font-size:16px;}
.btn-leave{background:var(--red);color:white;border:none;border-radius:6px;padding:6px 12px;font-family:'Jua',sans-serif;font-size:12px;cursor:pointer;}
.game-layout{display:grid;grid-template-columns:1fr 310px;gap:20px;align-items:start;}
@media(max-width:740px){.game-layout{grid-template-columns:1fr;}.right-col{order:-1;}}

/* Board */
.board-wrap{
  background:var(--board);border:4px solid var(--wood);border-radius:20px;
  padding:14px;box-shadow:0 6px 30px var(--sh),inset 0 0 0 2px var(--wood-l);
}
#boardSvg{display:block;width:100%;max-width:500px;height:auto;margin:0 auto;}

/* Right col */
.right-col{display:flex;flex-direction:column;gap:14px;}
.panel{background:white;border:2px solid var(--wood-l);border-radius:14px;padding:16px;box-shadow:0 2px 12px var(--sh);}
.panel-title{font-family:'Jua',sans-serif;font-size:15px;color:var(--wood-d);margin-bottom:10px;}

/* Yut throw */
.turn-txt{font-family:'Jua',sans-serif;font-size:17px;text-align:center;margin-bottom:12px;line-height:1.4;}
.turn-name{color:var(--wood-d);}
.not-my-turn{color:var(--muted);font-size:14px;text-align:center;padding:20px;}
.yut-stage{
  position:relative;width:100%;height:170px;
  background:linear-gradient(180deg,#d0eaff 0%,#b0d8f8 35%,var(--bg) 100%);
  border-radius:12px;border:2px dashed var(--wood-l);overflow:hidden;
  cursor:pointer;user-select:none;margin-bottom:10px;
}
.yut-stage.disabled{opacity:.5;pointer-events:none;}
.throw-hint{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:13px;font-family:'Jua',sans-serif;
  pointer-events:none;z-index:1;flex-direction:column;gap:4px;
}
.power-bar-wrap{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:80%;height:8px;background:rgba(0,0,0,.1);border-radius:4px;overflow:hidden;}
.power-bar{height:100%;width:0%;background:linear-gradient(90deg,#4caf6e,#f5c842,#e8534a);border-radius:4px;transition:width .05s;}
.yut-result-sticks{display:flex;gap:6px;justify-content:center;align-items:flex-end;min-height:48px;margin-bottom:6px;}
.stick-display{
  width:16px;height:56px;border-radius:8px;position:relative;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.stick-flat{background:linear-gradient(180deg,#c8804a,#a06030,#c0784a);border:1.5px solid #804020;}
.stick-round{background:linear-gradient(180deg,#f0d898,#d8a848,#ecca80);border:1.5px solid #b07828;}
.stick-baek{background:linear-gradient(180deg,#c8804a,#a06030,#c0784a);border:2px solid #e00;}
.stick-baek::after{content:'백';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8px;color:#fff;font-family:'Jua',sans-serif;font-weight:900;}
.yut-name-display{font-family:'Jua',sans-serif;font-size:22px;color:var(--wood-d);text-align:center;min-height:28px;margin-bottom:8px;}

/* Card overlay */
.card-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:100;align-items:center;justify-content:center;padding:16px;
}
.card-overlay.show{display:flex;}
.card-popup{
  background:linear-gradient(160deg,#fffdf5,#fff8e8);
  border:4px solid var(--yellow);border-radius:24px;
  padding:28px 24px 24px;text-align:center;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 12px 50px rgba(0,0,0,.3);
  max-width:520px;width:100%;
}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.card-popup-title{font-family:'Jua',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;}
.card-popup-sub{font-family:'Jua',sans-serif;font-size:20px;color:var(--wood-d);margin-bottom:20px;}
.card-choices{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.card-choice{
  background:white;border:3px solid var(--wood-l);border-radius:16px;
  padding:18px 10px 14px;cursor:pointer;
  transition:transform .15s,border-color .15s,box-shadow .15s;
  position:relative;overflow:hidden;
}
.card-choice::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(255,255,255,.8),transparent);
  border-radius:14px;pointer-events:none;
}
.card-choice:hover{transform:translateY(-6px) scale(1.03);border-color:var(--yellow);box-shadow:0 8px 24px rgba(245,200,66,.35);}
.card-choice.face-down{background:linear-gradient(135deg,#3a6186,#89253e);border-color:#3a6186;}
.card-choice.face-down .cc-icon,.card-choice.face-down .cc-title,.card-choice.face-down .cc-desc{visibility:hidden;}
.card-choice.face-down::after{content:'🎴';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:44px;}
.card-choice.disabled{opacity:.4;pointer-events:none;}
.cc-icon{font-size:42px;display:block;margin-bottom:10px;}
.cc-title{font-family:'Jua',sans-serif;font-size:16px;color:var(--wood-d);margin-bottom:4px;}
.cc-desc{font-size:11px;color:var(--muted);line-height:1.4;}

/* Result box */
.result-box{display:none;background:#fffbef;border:2px solid var(--yellow);border-radius:12px;padding:14px;text-align:center;animation:popIn .3s;}
.result-box.show{display:block;}
.result-big{font-family:'Jua',sans-serif;font-size:32px;color:var(--wood-d);line-height:1;}
.result-sub{font-size:12px;color:var(--muted);margin:4px 0 10px;}
.catch-notice{font-size:13px;color:var(--red);font-family:'Jua',sans-serif;background:#fff0ef;border-radius:8px;padding:6px 10px;margin-bottom:8px;}
.btn-next{background:var(--green);color:white;border:none;border-radius:8px;padding:10px 0;font-family:'Jua',sans-serif;font-size:15px;cursor:pointer;width:100%;transition:background .15s;}
.btn-next:hover{background:#388e3c;}
.btn-next:disabled{opacity:.5;cursor:not-allowed;}

/* Winner */
.winner-box{display:none;background:linear-gradient(135deg,#ffd700,#ffaa00);border-radius:14px;padding:24px;text-align:center;animation:popIn .4s;}
.winner-box.show{display:block;}
.winner-box h2{font-family:'Jua',sans-serif;font-size:26px;color:#7a4800;margin-bottom:8px;}
.btn-restart{background:#7a4800;color:white;border:none;border-radius:8px;padding:10px 0;font-family:'Jua',sans-serif;font-size:15px;cursor:pointer;width:100%;margin-top:12px;}

/* Player list */
.player-list-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
@media(max-width:500px){.player-list-bottom{grid-template-columns:repeat(2,1fr);}}
.p-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;border:2px solid #f0e4cc;background:white;}
.p-card.active{border-color:var(--yellow);background:#fffbef;box-shadow:0 2px 8px rgba(245,200,66,.3);}
.p-card.finished{border-color:var(--green);background:#f0fff4;}
.p-card.me{box-shadow:inset 0 0 0 2px var(--blue);}
.p-emoji-big{font-size:24px;}
.p-info .p-name{font-family:'Jua',sans-serif;font-size:13px;}
.p-info .p-pos{font-size:10px;color:var(--muted);}

/* Drama overlay */
.drama-overlay{display:none;position:fixed;inset:0;z-index:200;pointer-events:none;align-items:center;justify-content:center;}
.drama-overlay.show{display:flex;}
.drama-banner{position:relative;text-align:center;animation:dramaBurst .18s cubic-bezier(.34,1.9,.64,1) forwards;}
@keyframes dramaBurst{0%{transform:scale(0);opacity:0}70%{transform:scale(1.12);opacity:1}100%{transform:scale(1);opacity:1}}
.drama-banner.exit{animation:dramaExit .3s ease forwards;}
@keyframes dramaExit{to{transform:scale(1.3);opacity:0}}
.drama-bg{position:absolute;inset:-20px;border-radius:28px;filter:blur(2px);z-index:-1;}
.drama-title{font-family:'Jua',sans-serif;font-size:clamp(52px,10vw,96px);line-height:1;text-shadow:0 4px 0 rgba(0,0,0,.3);-webkit-text-stroke:3px rgba(255,255,255,.6);}
.drama-sub{font-family:'Jua',sans-serif;font-size:clamp(18px,4vw,32px);margin-top:8px;text-shadow:0 2px 8px rgba(0,0,0,.4);}
.drama-emoji-row{font-size:clamp(32px,6vw,56px);letter-spacing:6px;margin-bottom:10px;animation:emojiShake .5s ease infinite alternate;}
@keyframes emojiShake{0%{transform:rotate(-4deg)}100%{transform:rotate(4deg) scale(1.1)}}
.flash-overlay{position:fixed;inset:0;z-index:190;pointer-events:none;opacity:0;transition:opacity .08s;}
.flash-overlay.flash{opacity:.7;transition:none;}
.cbox{position:fixed;inset:0;pointer-events:none;z-index:999;}
.cp{position:absolute;animation:cpFall linear forwards;}
@keyframes cpFall{0%{transform:translateY(-10px);opacity:1}100%{transform:translateY(105vh) rotate(800deg);opacity:0}}
@keyframes pulseRing{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.18);opacity:.15}}

/* Connection status */
.conn-status{position:fixed;top:10px;right:10px;padding:6px 12px;border-radius:20px;font-size:11px;font-family:'Jua',sans-serif;z-index:50;}
.conn-status.online{background:#d4edda;color:#155724;}
.conn-status.offline{background:#f8d7da;color:#721c24;}
</style>
</head>
<body>

<div class="conn-status online" id="connStatus">🟢 연결됨</div>

<h1>🎴 인재육성팀의 재밌는 윷놀이</h1>
<p class="sub">온라인으로 함께 즐기는 윷놀이! 🎮</p>

<!-- ── LOBBY SCREEN ── -->
<div id="lobbyScreen">
  <div class="lobby-panel">
    <div class="lobby-title">🎮 게임 참여하기</div>

    <input type="text" class="lobby-input" id="myNameInput" placeholder="내 이름 입력 (최대 6자)" maxlength="6">

    <button class="btn-lobby" onclick="createRoom()" id="btnCreate">🎲 새 게임 만들기</button>

    <div class="divider">또는</div>

    <input type="text" class="lobby-input room-code" id="roomCodeInput" placeholder="방 코드 입력" maxlength="6">
    <button class="btn-lobby secondary" onclick="joinRoom()" id="btnJoin">🚪 게임 참여하기</button>

    <div class="error-msg" id="lobbyError"></div>
  </div>
</div>

<!-- ── WAITING ROOM ── -->
<div id="waitingScreen" style="display:none;width:100%;max-width:500px;">
  <div class="lobby-panel">
    <div class="lobby-title">⏳ 대기실</div>

    <div class="room-info">
      <div class="room-code-label">방 코드</div>
      <div class="room-code-display" id="displayRoomCode">----</div>
      <button class="copy-btn" onclick="copyRoomCode()">📋 코드 복사</button>
    </div>

    <div class="player-wait-list" id="waitingPlayerList"></div>

    <div class="waiting-msg" id="waitingMsg">다른 플레이어를 기다리는 중...</div>

    <button class="btn-lobby" onclick="startGameAsHost()" id="btnStartGame" disabled>🎴 게임 시작 (최소 2명)</button>
    <button class="btn-lobby secondary" onclick="leaveRoom()" style="margin-top:8px;">🚪 나가기</button>
  </div>
</div>

<!-- ── PIECE SELECT SCREEN ── -->
<div id="setupScreen">
  <div class="setup-panel">
    <div class="setup-title">🎯 내 말 선택하기</div>
    <div class="piece-grid" id="pieceGrid"></div>
    <div class="player-slots" id="playerSlots"></div>
    <button class="btn-confirm" id="btnReady" onclick="confirmPiece()" disabled>✅ 준비 완료!</button>
  </div>
</div>

<!-- ── GAME SCREEN ── -->
<div id="gameScreen">
  <div class="game-header">
    <div class="game-room-code">방 코드: <span id="gameRoomCode">----</span></div>
    <button class="btn-leave" onclick="leaveRoom()">🚪 나가기</button>
  </div>

  <div class="game-layout">
    <div class="board-wrap">
      <svg id="boardSvg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="right-col">
      <div class="panel">
        <div class="turn-txt" id="turnTxt">준비 중...</div>
        <div id="throwArea">
          <div class="yut-stage" id="yutStage">
            <div class="throw-hint" id="throwHint">
              <span style="font-size:28px">🎴</span>
              꾹 눌러서 던지기!
            </div>
            <div class="power-bar-wrap"><div class="power-bar" id="powerBar"></div></div>
          </div>
        </div>
        <div class="yut-result-sticks" id="stickDisplay"></div>
        <div class="yut-name-display" id="yutNameDisplay"></div>
      </div>

      <div class="result-box" id="resultBox">
        <div class="result-big" id="resultBig"></div>
        <div class="result-sub" id="resultSub"></div>
        <div class="catch-notice" id="catchNotice" style="display:none"></div>
        <button class="btn-next" id="btnNext" onclick="nextTurn()">다음 차례 →</button>
      </div>

      <div class="winner-box" id="winnerBox">
        <h2>🏆 <span id="winnerName"></span><br>우승!</h2>
        <button class="btn-restart" onclick="restartGame()">🔄 다시 시작</button>
      </div>
    </div>
  </div>

  <div style="width:100%;max-width:1060px;margin-top:18px;">
    <div style="font-family:'Jua',sans-serif;font-size:15px;color:var(--wood-d);margin-bottom:10px;">👥 참여자 현황</div>
    <div class="player-list-bottom" id="playerListBottom"></div>
  </div>
</div>

<!-- Card overlay -->
<div class="card-overlay" id="cardOverlay">
  <div class="card-popup">
    <div class="card-popup-title">✨ 미션 카드</div>
    <div class="card-popup-sub" id="cardPopupSub">카드 3장 중 하나를 선택하세요!</div>
    <div class="card-choices" id="cardChoices"></div>
  </div>
</div>

<div class="cbox" id="cbox"></div>
<div class="flash-overlay" id="flashOverlay"></div>
<div class="drama-overlay" id="dramaOverlay">
  <div class="drama-banner" id="dramaBanner">
    <div class="drama-bg" id="dramaBg"></div>
    <div class="drama-emoji-row" id="dramaEmoji"></div>
    <div class="drama-title" id="dramaTitle"></div>
    <div class="drama-sub" id="dramaSub"></div>
  </div>
</div>

// ═══════════════════════════════════════
// BOARD GEOMETRY
// ═══════════════════════════════════════
const W=500,H=500,PAD=52,CX=250,CY=250;
const OUTER=[];
(function(){
  for(let i=0;i<20;i++){
    const side=Math.floor(i/5),t=(i%5)/4;
    const L=PAD,R=W-PAD,T=PAD,B=H-PAD;
    let x,y;
    if(side===0){x=R;y=B-t*(B-T);}
    else if(side===1){x=R-t*(R-L);y=T;}
    else if(side===2){x=L;y=T+t*(B-T);}
    else{x=L+t*(R-L);y=B;}
    OUTER.push({x,y});
  }
})();
const INNER={
  20:{x:CX,y:CY},
  21:{x:(W-PAD+CX)/2,y:(H-PAD+CY)/2},
  22:{x:(PAD+CX)/2,  y:(H-PAD+CY)/2},
  23:{x:(PAD+CX)/2,  y:(PAD+CY)/2},
  24:{x:(W-PAD+CX)/2,y:(PAD+CY)/2},
};
function nodeXY(n){return n<20?OUTER[n]:INNER[n]||{x:CX,y:CY};}
function stepToNode(s){
  if(s<=0) return 0;
  if(s>=20) return 0;
  return s % 20;
}
const CARD_NODES = new Set([20,18,12,3]);
const CORNER_NODES = new Set([0,5,10,15]);

function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0; i<4; i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

function generatePlayerId() {
  return 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
}

  ['lobbyScreen','waitingScreen','setupScreen','gameScreen'].forEach(id => {
    document.getElementById(id).style.display = id===screenId ? 'block' : 'none';

}

function showError(msg) {
  document.getElementById('lobbyError').textContent = msg;
  setTimeout(() => document.getElementById('lobbyError').textContent = '', 3000);
}

// ═══════════════════════════════════════
// LOBBY - CREATE ROOM
// ═══════════════════════════════════════
async function createRoom() {
  myName = document.getElementById('myNameInput').value.trim();
  if(!myName) { showError('이름을 입력해 주세요!'); return; }
  if(myName.length > 6) { showError('이름은 6자 이내로!'); return; }

  myPlayerId = generatePlayerId();
  currentRoomCode = generateRoomCode();
  isHost = true;

  roomRef = db.ref('rooms/' + currentRoomCode);

  // Check if room exists
  const snapshot = await roomRef.once('value');
  if(snapshot.exists()) {
    currentRoomCode = generateRoomCode();
    roomRef = db.ref('rooms/' + currentRoomCode);
  }

  // Create room
  await roomRef.set({
    host: myPlayerId,
    status: 'waiting', // waiting, selecting, playing, finished
    players: {
      [myPlayerId]: {
        name: myName,
        oddy: Date.now(),
        pieceId: null,
        ready: false,
        steps: 0,
        finished: false
      }
    },
    gameData: {
      curIdx: 0,
      turnPlayerId: null,
      lastAction: null,
      pendingBonus: false,
      cardData: null
    },
    createdAt: firebase.database.ServerValue.TIMESTAMP
  });

  // Remove room on disconnect
  roomRef.onDisconnect().remove();

  setupRoomListeners();
  showScreen('waitingScreen');
  document.getElementById('displayRoomCode').textContent = currentRoomCode;
}

// ═══════════════════════════════════════
// LOBBY - JOIN ROOM
// ═══════════════════════════════════════
async function joinRoom() {
  myName = document.getElementById('myNameInput').value.trim();
  if(!myName) { showError('이름을 입력해 주세요!'); return; }

  const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
  if(!code || code.length < 4) { showError('방 코드를 입력해 주세요!'); return; }

  roomRef = db.ref('rooms/' + code);
  const snapshot = await roomRef.once('value');

  if(!snapshot.exists()) {
    showError('존재하지 않는 방입니다!');
    return;
  }

  const roomData = snapshot.val();
  if(roomData.status !== 'waiting') {
    showError('이미 게임이 시작된 방입니다!');
    return;
  }

  const playerCount = Object.keys(roomData.players || {}).length;
  if(playerCount >= 6) {
    showError('방이 가득 찼습니다! (최대 6명)');
    return;
  }

  myPlayerId = generatePlayerId();
  currentRoomCode = code;
  isHost = false;

  // Join room
  await roomRef.child('players/' + myPlayerId).set({
    name: myName,
    joinedAt: firebase.database.ServerValue.TIMESTAMP,
    pieceId: null,
    ready: false,
    steps: 0,
    finished: false
  });

  // Remove player on disconnect
  roomRef.child('players/' + myPlayerId).onDisconnect().remove();

  setupRoomListeners();
  showScreen('waitingScreen');
  document.getElementById('displayRoomCode').textContent = currentRoomCode;
}

// ═══════════════════════════════════════
// ROOM LISTENERS
// ═══════════════════════════════════════
function setupRoomListeners() {
  // Clean up old listeners
  localListeners.forEach(l => l());
  localListeners = [];

  // Listen to room changes
  const roomListener = roomRef.on('value', snapshot => {
    if(!snapshot.exists()) {
      alert('방이 종료되었습니다!');
      resetToLobby();
      return;
    }

    gameState = snapshot.val();
    updateUI();
  });
  localListeners.push(() => roomRef.off('value', roomListener));
}

function updateUI() {
  if(!gameState) return;

  const status = gameState.status;

  if(status === 'waiting') {
    renderWaitingRoom();
  } else if(status === 'selecting') {
    showScreen('setupScreen');
    renderPieceSelection();
  } else if(status === 'playing' || status === 'finished') {
    showScreen('gameScreen');
    document.getElementById('gameRoomCode').textContent = currentRoomCode;
    renderGame();
  }
}

// ═══════════════════════════════════════
// PIECE SELECTION
// ═══════════════════════════════════════
function renderPieceSelection() {
  const players = gameState.players || {};
  const takenPieces = new Set();
  Object.values(players).forEach(p => { if(p.pieceId) takenPieces.add(p.pieceId); });

  const myData = players[myPlayerId];
  const myPiece = myData?.pieceId;

  // Render piece grid
  const grid = document.getElementById('pieceGrid');
  grid.innerHTML = PIECE_DEFS.map(p => {
    const taken = takenPieces.has(p.id) && p.id !== myPiece;
    const selected = p.id === selectedPiece || p.id === myPiece;
    return `
      <div class="piece-btn ${taken?'taken':''} ${selected?'selected':''}" onclick="selectPieceLocal('${p.id}')">
        <span class="piece-emoji">${p.emoji}</span>
        <div class="piece-name">${p.name}</div>
      </div>`;
  }).join('');

  // Render player slots
  const slots = document.getElementById('playerSlots');
  slots.innerHTML = Object.entries(players).map(([pid, p]) => {
    const piece = PIECE_DEFS.find(d => d.id === p.pieceId);
    return `
      <div class="slot ${pid===myPlayerId?'me':''}">
        <span class="slot-emoji">${piece?.emoji||'❓'}</span>
        <span class="slot-name">${p.name}${pid===myPlayerId?' (나)':''}</span>
        <span class="slot-ready ${p.ready?'yes':'no'}">${p.ready?'준비완료':'선택중'}</span>
      </div>`;
  }).join('');

  // Ready button
  const btn = document.getElementById('btnReady');
  if(myData?.ready) {
    btn.textContent = '⏳ 다른 플레이어 대기 중...';
    btn.disabled = true;
  } else {
    btn.textContent = '✅ 준비 완료!';
    btn.disabled = !selectedPiece && !myPiece;
  }

  // Check if all ready
  const allReady = Object.values(players).every(p => p.ready);
  if(allReady && isHost && Object.keys(players).length >= 2) {
    startPlaying();
  }
}

function selectPieceLocal(pieceId) {
  const players = gameState.players || {};
  const takenPieces = new Set();
  Object.entries(players).forEach(([pid, p]) => {
    if(p.pieceId && pid !== myPlayerId) takenPieces.add(p.pieceId);
  });

  if(takenPieces.has(pieceId)) return;
  if(players[myPlayerId]?.ready) return;

  selectedPiece = pieceId;
  renderPieceSelection();
}

async function confirmPiece() {
  if(!selectedPiece) return;

  await roomRef.child('players/' + myPlayerId).update({
    pieceId: selectedPiece,
    ready: true
  });
}

async function startPlaying() {
  const players = gameState.players || {};
  const playerIds = Object.keys(players);

  await roomRef.update({
    status: 'playing',
    'gameData/turnPlayerId': playerIds[0],
    'gameData/curIdx': 0
  });
}

// ═══════════════════════════════════════
// GAME RENDERING
// ═══════════════════════════════════════
function renderGame() {
  const players = gameState.players || {};
  const gd = gameState.gameData || {};
  const turnPlayerId = gd.turnPlayerId;
  const isMyTurn = turnPlayerId === myPlayerId;

  // Turn text
  const turnPlayer = players[turnPlayerId];
  const turnPiece = PIECE_DEFS.find(d => d.id === turnPlayer?.pieceId);
  document.getElementById('turnTxt').innerHTML = turnPlayer 
    ? `<span class="turn-name">${turnPiece?.emoji||''} ${turnPlayer.name}</span>${turnPlayerId===myPlayerId?' (내 차례!)':' 님의 차례'}`
    : '준비 중...';

  // Yut stage
  const yutStage = document.getElementById('yutStage');
  if(isMyTurn && gameState.status === 'playing') {
    yutStage.classList.remove('disabled');
    yutStage.onmousedown = e => startCharge(e);
    yutStage.ontouchstart = e => startCharge(e);
    yutStage.onmouseup = () => throwYut();
    yutStage.ontouchend = () => throwYut();
    yutStage.onmouseleave = () => cancelCharge();
  } else {
    yutStage.classList.add('disabled');
    yutStage.onmousedown = null;
    yutStage.ontouchstart = null;
    yutStage.onmouseup = null;
    yutStage.ontouchend = null;
  }

  // Show last action result
  if(gd.lastAction) {
    showStickResult(gd.lastAction);
    if(gd.lastAction.showResult) {
      showResultBox(gd.lastAction);
    }
  }

  // Card overlay
  if(gd.cardData && gd.cardData.playerId === myPlayerId && !gd.cardData.chosen) {
    showCardOverlay(gd.cardData);
  } else {
    document.getElementById('cardOverlay').classList.remove('show');
  }

  // Winner
  if(gameState.status === 'finished' && gd.winnerId) {
    const winner = players[gd.winnerId];
    const winPiece = PIECE_DEFS.find(d => d.id === winner?.pieceId);
    document.getElementById('winnerName').textContent = (winPiece?.emoji||'') + ' ' + (winner?.name||'');
    document.getElementById('winnerBox').classList.add('show');
    confetti();
  } else {
    document.getElementById('winnerBox').classList.remove('show');
  }

  renderBoard();
  renderPlayerListBottom();
}

// ═══════════════════════════════════════
// YUT THROWING
// ═══════════════════════════════════════
let chargeInterval = null;
let chargeLevel = 0;
let throwing = false;

function startCharge(e) {
  if(e) e.preventDefault();
  if(throwing) return;

  chargeLevel = 0;
  const t0 = Date.now();
  chargeInterval = setInterval(() => {
    chargeLevel = Math.min(100, (Date.now()-t0)/20);
    document.getElementById('powerBar').style.width = chargeLevel + '%';
  }, 30);

  document.getElementById('throwHint').style.display = 'none';
  document.getElementById('stickDisplay').innerHTML = '';
  document.getElementById('yutNameDisplay').textContent = '';
}

function cancelCharge() {
  if(chargeInterval) {
    clearInterval(chargeInterval);
    chargeInterval = null;
  }
  document.getElementById('powerBar').style.width = '0%';
  document.getElementById('throwHint').style.display = 'flex';
}

async function throwYut() {
  if(!chargeInterval || throwing) return;
  clearInterval(chargeInterval);
  chargeInterval = null;
  throwing = true;

  document.getElementById('powerBar').style.width = '0%';

  // Roll outcome
  const outcome = rollOutcome();

  // Calculate new position
  const players = gameState.players || {};
  const myData = players[myPlayerId];
  const oldSteps = myData.steps || 0;
  let newSteps = oldSteps + outcome.steps;
  if(newSteps < 0) newSteps = 0;

  const finished = newSteps >= 20;
  if(finished) newSteps = 20;

  const newNode = finished ? 0 : stepToNode(newSteps);

  // Check catch
  const caught = [];
  Object.entries(players).forEach(([pid, p]) => {
    if(pid === myPlayerId || p.finished) return;
    if(stepToNode(p.steps) === newNode && newNode !== 0 && !finished) {
      caught.push({pid, name: p.name, pieceId: p.pieceId});
    }
  });

  // Check card node
  const isCardNode = !finished && CARD_NODES.has(newNode);

  // Update Firebase
  const updates = {};
  updates[`players/${myPlayerId}/steps`] = newSteps;
  updates[`players/${myPlayerId}/finished`] = finished;

  // Reset caught players
  caught.forEach(c => {
    updates[`players/${c.pid}/steps`] = 0;
  });

  updates['gameData/lastAction'] = {
    type: 'throw',
    playerId: myPlayerId,
    outcome: outcome,
    oldSteps,
    newSteps,
    caught: caught,
    showResult: !isCardNode,
    timestamp: Date.now()
  };

  if(isCardNode) {
    // Show card selection
    const cards = shuffleCards();
    updates['gameData/cardData'] = {
      playerId: myPlayerId,
      cards: cards,
      isBonus: outcome.bonus,
      chosen: false
    };
  }

  updates['gameData/pendingBonus'] = outcome.bonus && !isCardNode;

  if(finished) {
    updates['status'] = 'finished';
    updates['gameData/winnerId'] = myPlayerId;
  }

  await roomRef.update(updates);

  // Drama effects
  if(outcome.name === '윷') setTimeout(() => showDrama('yut'), 300);
  else if(outcome.name === '모') setTimeout(() => showDrama('mo'), 300);
  else if(outcome.name === '백도') setTimeout(() => showDrama('baekdo'), 300);
  if(caught.length) setTimeout(() => showDrama('catch', caught.map(c=>c.name).join(', ')+' 잡았어요!'), 500);
  if(finished) setTimeout(() => showDrama('goal', myName+' 골인!'), 400);

  throwing = false;
}

const YUT_OUTCOMES = [
  {name:'백도', kor:'백도 (-1칸)', steps:-1, bonus:false, sticks:[true,false,false,false], baek:true},
  {name:'도',   kor:'도 (1칸)',   steps:1,  bonus:false, sticks:[true,false,false,false]},
  {name:'개',   kor:'개 (2칸)',   steps:2,  bonus:false, sticks:[true,true,false,false]},
  {name:'걸',   kor:'걸 (3칸)',   steps:3,  bonus:false, sticks:[true,true,true,false]},
  {name:'윷',   kor:'윷 (4칸, 한 번 더!)', steps:4, bonus:true, sticks:[false,false,false,false]},
  {name:'모',   kor:'모 (5칸, 한 번 더!)', steps:5, bonus:true, sticks:[true,true,true,true]},
];
const YUT_W = [5,25,25,22,12,11];

function rollOutcome() {
  const total = YUT_W.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for(let i=0; i<YUT_W.length; i++) {
    r -= YUT_W[i];
    if(r <= 0) return YUT_OUTCOMES[i];
  }
  return YUT_OUTCOMES[1];
}

function showStickResult(action) {
  if(!action.outcome) return;
  const outcome = action.outcome;
  const el = document.getElementById('stickDisplay');
  el.innerHTML = outcome.sticks.map((flat, i) => {
    const isBaek = outcome.baek && i===0;
    if(isBaek) return `<div class="stick-display stick-baek"></div>`;
    return `<div class="stick-display ${flat?'stick-flat':'stick-round'}"></div>`;
  }).join('');
  document.getElementById('yutNameDisplay').textContent = outcome.name;
  document.getElementById('throwHint').style.display = 'flex';
}

function showResultBox(action) {
  const box = document.getElementById('resultBox');
  const players = gameState.players || {};
  const player = players[action.playerId];
  const piece = PIECE_DEFS.find(d => d.id === player?.pieceId);

  document.getElementById('resultBig').textContent = action.outcome.name + (action.outcome.bonus?' 🎉':'');
  document.getElementById('resultSub').textContent = `${piece?.emoji||''} ${player?.name||''} — ${action.newSteps}번째 칸`;

  const cn = document.getElementById('catchNotice');
  if(action.caught && action.caught.length) {
    cn.style.display = 'block';
    cn.textContent = action.caught.map(c => {
      const cp = PIECE_DEFS.find(d=>d.id===c.pieceId);
      return (cp?.emoji||'')+c.name;
    }).join(', ') + ' 잡았어요! 🏠';
  } else {
    cn.style.display = 'none';
  }

  const btn = document.getElementById('btnNext');
  const isMyTurn = action.playerId === myPlayerId;
  const gd = gameState.gameData || {};

  if(gd.pendingBonus) {
    btn.textContent = '한 번 더 던지기! 🎴';
  } else {
    btn.textContent = '다음 차례 →';
  }
  btn.disabled = !isMyTurn;

  box.classList.add('show');
}

async function nextTurn() {
  document.getElementById('resultBox').classList.remove('show');

  const gd = gameState.gameData || {};

  if(gd.pendingBonus) {
    // Bonus turn - same player
    await roomRef.child('gameData').update({
      pendingBonus: false,
      lastAction: null
    });
  } else {
    // Next player
    const players = gameState.players || {};
    const playerIds = Object.keys(players).filter(pid => !players[pid].finished);
    const curIdx = playerIds.indexOf(myPlayerId);
    const nextIdx = (curIdx + 1) % playerIds.length;
    const nextPlayerId = playerIds[nextIdx];

    await roomRef.child('gameData').update({
      turnPlayerId: nextPlayerId,
      curIdx: nextIdx,
      lastAction: null,
      pendingBonus: false
    });
  }
}

// ═══════════════════════════════════════
// CARD SYSTEM
// ═══════════════════════════════════════
const CARDS = [
  {id:'back1',   icon:'↩️', title:'뒤로 한 칸!',   desc:'한 칸 뒤로',  effect:-1},
  {id:'again',   icon:'🔄', title:'한 번 더!',      desc:'한 번 더 던지기', effect:'again'},
  {id:'forward1',icon:'➡️', title:'앞으로 한 칸!', desc:'한 칸 앞으로', effect:1},
  {id:'reset',   icon:'🏠', title:'처음으로!',     desc:'출발점으로',  effect:'reset'},
];

function shuffleCards() {
  return [...CARDS].sort(() => Math.random()-.5).slice(0,3);
}

function showCardOverlay(cardData) {
  const container = document.getElementById('cardChoices');
  const players = gameState.players || {};
  const player = players[cardData.playerId];
  const piece = PIECE_DEFS.find(d => d.id === player?.pieceId);

  document.getElementById('cardPopupSub').textContent = `${piece?.emoji||''} ${player?.name||''} — 카드를 선택하세요!`;

  container.innerHTML = cardData.cards.map((card, i) => `
    <div class="card-choice face-down" id="cc-${i}" onclick="revealCard(${i})">
      <span class="cc-icon">${card.icon}</span>
      <div class="cc-title">${card.title}</div>
      <div class="cc-desc">${card.desc}</div>
    </div>
  `).join('');

  document.getElementById('cardOverlay').classList.add('show');
}

async function revealCard(idx) {
  const gd = gameState.gameData || {};
  const cardData = gd.cardData;
  if(!cardData || cardData.playerId !== myPlayerId) return;

  const card = cardData.cards[idx];
  const el = document.getElementById('cc-'+idx);
  if(!el || !el.classList.contains('face-down')) return;

  // Reveal animation
  el.classList.remove('face-down');
  [0,1,2].forEach(i => {
    if(i !== idx) {
      const o = document.getElementById('cc-'+i);
      if(o) { o.classList.add('disabled'); }
    }
  });

  // Apply card effect
  setTimeout(async () => {
    document.getElementById('cardOverlay').classList.remove('show');

    const players = gameState.players || {};
    const myData = players[myPlayerId];
    let newSteps = myData.steps;

    if(card.effect === 'reset') {
      newSteps = 0;
    } else if(card.effect === 'again') {
      // Bonus turn
      await roomRef.child('gameData').update({
        cardData: null,
        pendingBonus: true,
        lastAction: {
          type: 'card',
          playerId: myPlayerId,
          card: card,
          showResult: true,
          timestamp: Date.now()
        }
      });
      return;
    } else {
      newSteps = Math.max(0, Math.min(19, newSteps + card.effect));
    }

    // Check catch after card
    const newNode = stepToNode(newSteps);
    const caught = [];
    Object.entries(players).forEach(([pid, p]) => {
      if(pid === myPlayerId || p.finished) return;
      if(stepToNode(p.steps) === newNode && newNode !== 0) {
        caught.push({pid, name: p.name, pieceId: p.pieceId});
      }
    });

    const updates = {};
    updates[`players/${myPlayerId}/steps`] = newSteps;
    caught.forEach(c => {
      updates[`players/${c.pid}/steps`] = 0;
    });

    updates['gameData/cardData'] = null;
    updates['gameData/pendingBonus'] = cardData.isBonus;
    updates['gameData/lastAction'] = {
      type: 'card',
      playerId: myPlayerId,
      card: card,
      newSteps,
      caught,
      showResult: true,
      timestamp: Date.now()
    };

    await roomRef.update(updates);
  }, 800);
}

// BOARD RENDERING
// ═══════════════════════════════════════
function renderBoard() {
  const svg = document.getElementById('boardSvg');
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  function el(tag, attrs, txt) {
    const e = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
    if(txt != null) e.textContent = txt;
    return e;
  }

  // Background
  svg.appendChild(el('rect',{x:0,y:0,width:500,height:500,fill:'#fdf6e8',rx:14}));
  svg.appendChild(el('rect',{x:4,y:4,width:492,height:492,fill:'none',stroke:'#d4b886','stroke-width':2.5,rx:12,'stroke-dasharray':'8,5'}));

  // Lines
  for(let i=0;i<20;i++){
    const a=OUTER[i],b=OUTER[(i+1)%20];
    svg.appendChild(el('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#c8a878','stroke-width':3,'stroke-dasharray':'6,4'}));
  }
  [[0,21],[21,20],[20,23],[23,10],[5,24],[24,20],[20,22],[22,15]].forEach(([a,b])=>{
    const p1=a<20?OUTER[a]:INNER[a],p2=b<20?OUTER[b]:INNER[b];
    svg.appendChild(el('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:'#b8986a','stroke-width':2.5,'stroke-dasharray':'5,4'}));
  });

  // Nodes
  for(let i=0;i<20;i++){
    const p=OUTER[i];
    const isHome=i===0, isCorner=CORNER_NODES.has(i), isCard=CARD_NODES.has(i);
    const r=isHome?30:isCorner?22:isCard?28:15;
    let fill='white',stroke='#c8a878',sw=2;
    if(isHome){fill='#4caf6e';stroke='#2e7d32';sw=4;}
    else if(isCard){fill='#fff4c2';stroke='#e6a800';sw=3;}
    else if(isCorner){fill='#fdf0d8';stroke='#b8864e';sw=3;}
    svg.appendChild(el('circle',{cx:p.x,cy:p.y,r,fill,stroke,'stroke-width':sw}));
    if(isCard){
      svg.appendChild(el('circle',{cx:p.x,cy:p.y,r:r+5,fill:'none',stroke:'#f5c842','stroke-width':2,opacity:'0.6'}));
    }
    if(isHome){
      svg.appendChild(el('text',{x:p.x,y:p.y-38,'text-anchor':'middle','font-family':'Jua','font-size':14,fill:'#2e7d32'},'🏁 출발/골인'));
      svg.appendChild(el('text',{x:p.x,y:p.y+7,'text-anchor':'middle','font-family':'Jua','font-size':15,fill:'white'},'HOME'));
    } else if(isCard){
      svg.appendChild(el('text',{x:p.x,y:p.y+4,'text-anchor':'middle','font-size':28},'🃏'));
    } else if(isCorner){
      const lbl={5:'동',10:'북',15:'서'};
      svg.appendChild(el('text',{x:p.x,y:p.y+5,'text-anchor':'middle','font-family':'Jua','font-size':13,fill:'#7a5230'},lbl[i]||i));
    } else {
      svg.appendChild(el('text',{x:p.x,y:p.y+4,'text-anchor':'middle','font-family':'Jua','font-size':10,fill:'#a08060'},i));
    }
  }

  // Inner nodes
  Object.entries(INNER).forEach(([id,p])=>{
    const nid=parseInt(id);
    const isCenter=nid===20, isCard=CARD_NODES.has(nid);
    const r=isCenter?26:isCard?26:13;
    const fill=isCenter||isCard?'#fff4c2':'white';
    const stroke=isCenter||isCard?'#e6a800':'#c8a878';
    svg.appendChild(el('circle',{cx:p.x,cy:p.y,r,fill,stroke,'stroke-width':isCenter?3:2}));
    if(isCenter||isCard){
      svg.appendChild(el('text',{x:p.x,y:p.y+6,'text-anchor':'middle','font-size':28},'🎴'));
    }
  });

  // Players
  const players = gameState?.players || {};
  const gd = gameState?.gameData || {};
  const byNode = {};

  Object.entries(players).forEach(([pid, p]) => {
    if(p.finished) return;
    const node = stepToNode(p.steps);
    if(!byNode[node]) byNode[node] = [];
    byNode[node].push({...p, oddy: pid});
  });

  Object.entries(byNode).forEach(([nodeStr, plist]) => {
    const node = parseInt(nodeStr);
    const base = node<20 ? OUTER[node] : INNER[node] || {x:CX,y:CY};
    const n = plist.length;

    plist.forEach((p, k) => {
      const piece = PIECE_DEFS.find(d => d.id === p.pieceId);
      if(!piece) return;

      const angle = n>1 ? (k/n)*Math.PI*2-Math.PI/2 : 0;
      const dist = n>1 ? 18 : 0;
      const px = base.x + Math.cos(angle)*dist;
      const py = base.y + Math.sin(angle)*dist;
      const R = 22;
      const isActive = p.oddy === gd.turnPlayerId;

      if(isActive) {
        const ring = el('circle',{cx:px,cy:py,r:R+8,fill:'none',stroke:piece.color,'stroke-width':3,opacity:'0.4'});
        ring.style.animation = 'pulseRing 1.2s infinite';
        svg.appendChild(ring);
      }

      svg.appendChild(el('ellipse',{cx:px+2,cy:py+R-2,rx:R-4,ry:6,fill:'rgba(0,0,0,0.2)'}));
      svg.appendChild(el('circle',{cx:px,cy:py,r:R,fill:piece.color,stroke:'white','stroke-width':2.5}));
      svg.appendChild(el('text',{x:px,y:py+8,'text-anchor':'middle','font-size':22},piece.emoji));
      svg.appendChild(el('text',{x:px,y:py+R+13,'text-anchor':'middle','font-family':'Jua','font-size':10,fill:piece.color},p.name));
    });
  });
}

function renderPlayerListBottom() {
  const el = document.getElementById('playerListBottom');
  const players = gameState?.players || {};
  const gd = gameState?.gameData || {};

  el.innerHTML = Object.entries(players).map(([pid, p]) => {
    const piece = PIECE_DEFS.find(d => d.id === p.pieceId);
    const isActive = pid === gd.turnPlayerId;
    const isMe = pid === myPlayerId;
    return `
      <div class="p-card ${isActive?'active':''} ${p.finished?'finished':''} ${isMe?'me':''}">
        <div class="p-emoji-big">${piece?.emoji||'❓'}</div>
        <div class="p-info">
          <div class="p-name">${p.name}${isMe?' (나)':''}${p.finished?' 🏆':''}</div>
          <div class="p-pos">${p.finished?'완주!':p.steps<=0?'출발 전':`${p.steps}번째 칸`}</div>
        </div>
      </div>`;
  }).join('');
}

  mo: {emoji:'🔥💥🔥',title:'모!!!',sub:'5칸+한번더!',bg:'linear-gradient(135deg,#c0392b,#e74c3c)',color:'#fff',flash:'rgba(255,80,30,.9)'},
  baekdo: {emoji:'😱😱😱',title:'백도!',sub:'한 칸 뒤로...',bg:'linear-gradient(135deg,#636e72,#2d3436)',color:'#ccc',flash:'rgba(50,50,50,.7)'},
  catch: {emoji:'💥👊💥',title:'잡았다!!',sub:'',bg:'linear-gradient(135deg,#e8534a,#c0392b)',color:'#fff',flash:'rgba(232,83,74,.85)'},
  goal: {emoji:'🏆🎊🏆',title:'골인!!!',sub:'',bg:'linear-gradient(135deg,#f9ca24,#f0932b)',color:'#7a4800',flash:'rgba(250,200,30,.9)'}
};

function showDrama(preset, subOverride, dur=2000) {
  const d = DRAMA_PRESETS[preset];
  if(!d) return;

  document.getElementById('dramaBg').style.background = d.bg;
  document.getElementById('dramaEmoji').textContent = d.emoji;
  document.getElementById('dramaTitle').textContent = d.title;
  document.getElementById('dramaTitle').style.color = d.color;
  document.getElementById('dramaSub').textContent = subOverride || d.sub;

  const flash = document.getElementById('flashOverlay');
  flash.style.background = d.flash;
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 120);

  const overlay = document.getElementById('dramaOverlay');
  const banner = document.getElementById('dramaBanner');
  banner.classList.remove('exit');
  overlay.classList.add('show');

  setTimeout(() => {
    banner.classList.add('exit');
    setTimeout(() => {
      overlay.classList.remove('show');
      banner.classList.remove('exit');
    }, 350);
  }, dur);
}

function confetti() {
  const box = document.getElementById('cbox');
  const colors = ['#f5c842','#e8534a','#4caf6e','#4a8fd9','#9b59b6','#e67e22'];
  for(let i=0; i<80; i++) {
    const d = document.createElement('div');
    d.className = 'cp';
    const s = 6+Math.random()*9;
    d.style.cssText = `left:${Math.random()*100}%;top:-20px;width:${s}px;height:${s}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.4+Math.random()*1.4}s;animation-delay:${Math.random()*0.8}s;`;
    box.appendChild(d);
    setTimeout(() => d.remove(), 3500);
  }
}

// ═══════════════════════════════════════
// RESTART & LEAVE
// ═══════════════════════════════════════
async function restartGame() {
  if(!isHost) return;

  const players = gameState.players || {};
  const updates = { status: 'playing' };
  updates['gameData/curIdx'] = 0;
  updates['gameData/turnPlayerId'] = Object.keys(players)[0];
  updates['gameData/lastAction'] = null;
  updates['gameData/pendingBonus'] = false;
  updates['gameData/cardData'] = null;
  updates['gameData/winnerId'] = null;

  Object.keys(players).forEach(pid => {
    updates[`players/${pid}/steps`] = 0;
    updates[`players/${pid}/finished`] = false;
  });

  await roomRef.update(updates);
  document.getElementById('winnerBox').classList.remove('show');
}

async function leaveRoom() {
  if(roomRef && myPlayerId) {
    await roomRef.child('players/' + myPlayerId).remove();

    // If host leaves, delete room
    if(isHost) {
      await roomRef.remove();
    }
  }
  resetToLobby();
}

function resetToLobby() {
  localListeners.forEach(l => l());
  localListeners = [];
  roomRef = null;
  gameState = null;
  currentRoomCode = null;
  myPlayerId = null;
  isHost = false;
  selectedPiece = null;
  throwing = false;

  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('winnerBox').classList.remove('show');
  document.getElementById('cardOverlay').classList.remove('show');
  document.getElementById('stickDisplay').innerHTML = '';
  document.getElementById('yutNameDisplay').textContent = '';

  showScreen('lobbyScreen');
}

// Initialize
showScreen('lobbyScreen');
