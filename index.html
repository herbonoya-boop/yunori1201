<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아의 디코드 찾기</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5ede0;--board:#fdf6e8;--wood:#b8864e;--wood-d:#7a5230;--wood-l:#e8d0a8;
  --line:#c8a878;--text:#3a2010;--muted:#9e7a50;--sh:rgba(0,0,0,0.13);
  --green:#4caf6e;--red:#e8534a;--yellow:#f5c842;--blue:#4a8fd9;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse at 20% 20%,rgba(184,134,78,.15) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 80%,rgba(76,175,110,.1) 0%,transparent 55%);
  font-family:'Noto Sans KR',sans-serif;color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:16px 12px 40px;
}
h1{font-family:'Jua',sans-serif;font-size:clamp(20px,4vw,34px);color:var(--wood-d);margin-bottom:2px;text-align:center;}
.sub{color:var(--muted);font-size:13px;margin-bottom:16px;text-align:center;}

/* ── LOBBY SCREEN ── */
#lobbyScreen{width:100%;max-width:500px;}
.lobby-panel{background:white;border:2px solid var(--wood-l);border-radius:16px;padding:24px;box-shadow:0 4px 20px var(--sh);margin-bottom:16px;text-align:center;}
.lobby-title{font-family:'Jua',sans-serif;font-size:22px;color:var(--wood-d);margin-bottom:20px;}
.lobby-input{width:100%;border:2px solid var(--wood-l);border-radius:10px;padding:14px;font-family:'Noto Sans KR',sans-serif;font-size:16px;outline:none;color:var(--text);background:#fffdf8;transition:border-color .2s;margin-bottom:12px;text-align:center;}
.lobby-input:focus{border-color:var(--wood);}
.lobby-input.room-code{font-family:'Jua',sans-serif;font-size:24px;letter-spacing:4px;text-transform:uppercase;}
.btn-lobby{
  width:100%;background:linear-gradient(135deg,var(--yellow),#e6b000);
  color:var(--text);border:none;border-radius:12px;padding:16px;
  font-family:'Jua',sans-serif;font-size:18px;cursor:pointer;
  box-shadow:0 4px 14px rgba(245,200,66,.4);transition:transform .15s;margin-bottom:10px;
}
.btn-lobby:hover:not(:disabled){transform:translateY(-2px);}
.btn-lobby:disabled{opacity:.5;cursor:not-allowed;}
.btn-lobby.secondary{background:linear-gradient(135deg,var(--wood-l),var(--wood));color:white;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:13px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--wood-l);}
.error-msg{color:var(--red);font-size:13px;margin-top:8px;min-height:20px;}
.room-info{background:#f0fff4;border:2px solid var(--green);border-radius:12px;padding:16px;margin-bottom:16px;}
.room-code-display{font-family:'Jua',sans-serif;font-size:36px;letter-spacing:6px;color:var(--wood-d);}
.room-code-label{font-size:12px;color:var(--muted);margin-bottom:4px;}
.copy-btn{background:var(--green);color:white;border:none;border-radius:6px;padding:6px 14px;font-family:'Jua',sans-serif;font-size:12px;cursor:pointer;margin-top:8px;}
.player-wait-list{text-align:left;margin-top:16px;}
.player-wait-item{display:flex;align-items:center;gap:10px;padding:10px;background:#fffdf8;border-radius:8px;margin-bottom:8px;border:1px solid var(--wood-l);}
.player-wait-item.me{border-color:var(--yellow);background:#fffbef;}
.pwi-emoji{font-size:24px;}
.pwi-name{font-family:'Jua',sans-serif;font-size:15px;}
.pwi-host{font-size:10px;background:var(--yellow);color:var(--text);padding:2px 6px;border-radius:4px;margin-left:auto;}
.waiting-msg{color:var(--muted);font-size:13px;margin-top:12px;}

/* ── SETUP SCREEN ── */
#setupScreen{display:none;width:100%;max-width:600px;}
.setup-panel{background:white;border:2px solid var(--wood-l);border-radius:16px;padding:20px;box-shadow:0 4px 20px var(--sh);margin-bottom:16px;}
.setup-title{font-family:'Jua',sans-serif;font-size:18px;color:var(--wood-d);margin-bottom:14px;text-align:center;}
.piece-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:14px;}
.piece-btn{background:#fffdf8;border:2px solid var(--wood-l);border-radius:10px;padding:10px 4px;text-align:center;cursor:pointer;transition:all .15s;}
.piece-btn:hover:not(.taken){border-color:var(--wood);background:#fdf0d8;}
.piece-btn.selected{border-color:var(--yellow);background:#fffbef;box-shadow:0 0 0 2px var(--yellow);}
.piece-btn.taken{opacity:.35;cursor:not-allowed;background:#f0f0f0;}
.piece-emoji{font-size:28px;display:block;margin-bottom:3px;}
.piece-name{font-family:'Jua',sans-serif;font-size:11px;color:var(--muted);}
.btn-confirm{width:100%;background:linear-gradient(135deg,var(--yellow),#e6b000);color:var(--text);border:none;border-radius:10px;padding:13px;font-family:'Jua',sans-serif;font-size:17px;cursor:pointer;box-shadow:0 4px 14px rgba(245,200,66,.4);transition:transform .15s;}
.btn-confirm:hover:not(:disabled){transform:translateY(-2px);}
.btn-confirm:disabled{opacity:.35;cursor:not-allowed;}
.player-slots{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.slot{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;border:2px solid #f0e4cc;background:#fafafa;}
.slot.me{border-color:var(--yellow);background:#fffbef;}
.slot-emoji{font-size:22px;}
.slot-name{font-family:'Jua',sans-serif;font-size:14px;}
.slot-ready{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:auto;}
.slot-ready.yes{background:var(--green);color:white;}
.slot-ready.no{background:#ddd;color:#888;}

/* ── GAME SCREEN ── */
#gameScreen{display:none;width:100%;max-width:1060px;}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:8px 12px;background:white;border-radius:10px;border:1px solid var(--wood-l);}
.game-room-code{font-family:'Jua',sans-serif;font-size:14px;color:var(--muted);}
.game-room-code span{color:var(--wood-d);font-size:16px;}
.btn-leave{background:var(--red);color:white;border:none;border-radius:6px;padding:6px 12px;font-family:'Jua',sans-serif;font-size:12px;cursor:pointer;}
.game-layout{display:grid;grid-template-columns:1fr 310px;gap:20px;align-items:start;}
@media(max-width:740px){.game-layout{grid-template-columns:1fr;}.right-col{order:-1;}}

/* Board */
.board-wrap{background:var(--board);border:4px solid var(--wood);border-radius:20px;padding:14px;box-shadow:0 6px 30px var(--sh),inset 0 0 0 2px var(--wood-l);}
#boardSvg{display:block;width:100%;max-width:500px;height:auto;margin:0 auto;}

/* Right col */
.right-col{display:flex;flex-direction:column;gap:14px;}
.panel{background:white;border:2px solid var(--wood-l);border-radius:14px;padding:16px;box-shadow:0 2px 12px var(--sh);}

/* Yut throw */
.turn-txt{font-family:'Jua',sans-serif;font-size:17px;text-align:center;margin-bottom:12px;line-height:1.4;}
.turn-name{color:var(--wood-d);}
.yut-stage{position:relative;width:100%;height:170px;background:linear-gradient(180deg,#d0eaff 0%,#b0d8f8 35%,var(--bg) 100%);border-radius:12px;border:2px dashed var(--wood-l);overflow:hidden;cursor:pointer;user-select:none;margin-bottom:10px;}
.yut-stage.disabled{opacity:.5;pointer-events:none;}
.throw-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;font-family:'Jua',sans-serif;pointer-events:none;z-index:1;flex-direction:column;gap:4px;}
.power-bar-wrap{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:80%;height:8px;background:rgba(0,0,0,.1);border-radius:4px;overflow:hidden;}
.power-bar{height:100%;width:0%;background:linear-gradient(90deg,#4caf6e,#f5c842,#e8534a);border-radius:4px;transition:width .05s;}
.yut-result-sticks{display:flex;gap:6px;justify-content:center;align-items:flex-end;min-height:48px;margin-bottom:6px;}
.stick-display{width:16px;height:56px;border-radius:8px;position:relative;box-shadow:0 2px 6px rgba(0,0,0,0.2);}
.stick-flat{background:linear-gradient(180deg,#c8804a,#a06030,#c0784a);border:1.5px solid #804020;}
.stick-round{background:linear-gradient(180deg,#f0d898,#d8a848,#ecca80);border:1.5px solid #b07828;}
.stick-baek{background:linear-gradient(180deg,#c8804a,#a06030,#c0784a);border:2px solid #e00;}
.stick-baek::after{content:'X';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;color:#fff;font-family:'Jua',sans-serif;font-weight:900;}
.yut-name-display{font-family:'Jua',sans-serif;font-size:22px;color:var(--wood-d);text-align:center;min-height:28px;margin-bottom:8px;}

/* Shortcut choice modal */
.shortcut-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;align-items:center;justify-content:center;padding:16px;}
.shortcut-overlay.show{display:flex;}
.shortcut-popup{background:white;border:4px solid var(--yellow);border-radius:20px;padding:24px;text-align:center;animation:popIn .3s;max-width:400px;width:100%;}
.shortcut-title{font-family:'Jua',sans-serif;font-size:20px;color:var(--wood-d);margin-bottom:16px;}
.shortcut-btns{display:flex;gap:12px;justify-content:center;}
.shortcut-btn{flex:1;padding:16px;border-radius:12px;border:3px solid var(--wood-l);background:#fffdf8;cursor:pointer;transition:all .15s;font-family:'Jua',sans-serif;font-size:15px;}
.shortcut-btn:hover{border-color:var(--yellow);background:#fffbef;transform:translateY(-3px);}
.shortcut-btn .path-icon{font-size:32px;display:block;margin-bottom:8px;}

/* Card overlay */
.card-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center;padding:16px;}
.card-overlay.show{display:flex;}
.card-popup{background:linear-gradient(160deg,#fffdf5,#fff8e8);border:4px solid var(--yellow);border-radius:24px;padding:28px 24px 24px;text-align:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 12px 50px rgba(0,0,0,.3);max-width:520px;width:100%;}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.card-popup-title{font-family:'Jua',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;}
.card-popup-sub{font-family:'Jua',sans-serif;font-size:20px;color:var(--wood-d);margin-bottom:20px;}
.card-choices{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.card-choice{background:white;border:3px solid var(--wood-l);border-radius:16px;padding:18px 10px 14px;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;position:relative;overflow:hidden;}
.card-choice:hover{transform:translateY(-6px) scale(1.03);border-color:var(--yellow);box-shadow:0 8px 24px rgba(245,200,66,.35);}
.card-choice.face-down{background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-color:#6c5ce7;}
.card-choice.face-down .cc-icon,.card-choice.face-down .cc-title,.card-choice.face-down .cc-desc{visibility:hidden;}
.card-choice.face-down::after{content:'❓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;}
.card-choice.disabled{opacity:.4;pointer-events:none;}
.cc-icon{font-size:42px;display:block;margin-bottom:10px;}
.cc-title{font-family:'Jua',sans-serif;font-size:16px;color:var(--wood-d);margin-bottom:4px;}
.cc-desc{font-size:11px;color:var(--muted);line-height:1.4;}

/* Winner box */
.winner-box{display:none;background:linear-gradient(135deg,#ffd700,#ffaa00);border-radius:14px;padding:24px;text-align:center;animation:popIn .4s;}
.winner-box.show{display:block;}
.winner-box h2{font-family:'Jua',sans-serif;font-size:26px;color:#7a4800;margin-bottom:8px;}
.btn-restart{background:#7a4800;color:white;border:none;border-radius:8px;padding:10px 0;font-family:'Jua',sans-serif;font-size:15px;cursor:pointer;width:100%;margin-top:12px;}

/* Player list */
.player-list-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
@media(max-width:500px){.player-list-bottom{grid-template-columns:repeat(2,1fr);}}
.p-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;border:2px solid #f0e4cc;background:white;}
.p-card.active{border-color:var(--yellow);background:#fffbef;box-shadow:0 2px 8px rgba(245,200,66,.3);}
.p-card.finished{border-color:var(--green);background:#f0fff4;}
.p-card.me{box-shadow:inset 0 0 0 2px var(--blue);}
.p-emoji-big{font-size:24px;}
.p-info .p-name{font-family:'Jua',sans-serif;font-size:13px;}
.p-info .p-pos{font-size:10px;color:var(--muted);}

/* ═══ TURN NOTIFICATION ═══ */
.turn-notify{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:300;text-align:center;pointer-events:none;
}
.turn-notify.show{display:block;animation:turnPop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes turnPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}60%{transform:translate(-50%,-50%) scale(1.1)}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.turn-notify-inner{
  background:linear-gradient(135deg,#fff,#fffdf0);
  border:5px solid var(--yellow);border-radius:24px;
  padding:30px 50px;box-shadow:0 15px 60px rgba(0,0,0,.4);
}
.turn-notify-emoji{font-size:60px;animation:bounce .6s infinite alternate;}
@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-10px)}}
.turn-notify-text{font-family:'Jua',sans-serif;font-size:28px;color:var(--wood-d);margin-top:10px;}
.turn-notify-sub{font-family:'Jua',sans-serif;font-size:16px;color:var(--muted);margin-top:4px;}

/* ═══ YUT RESULT DRAMA ═══ */
.yut-drama{
  display:none;position:fixed;inset:0;z-index:250;
  align-items:center;justify-content:center;pointer-events:none;
}
.yut-drama.show{display:flex;}
.yut-drama-inner{
  text-align:center;
  animation:yutDramaPop .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes yutDramaPop{0%{transform:scale(0) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0deg);opacity:1}}
.yut-drama-inner.exit{animation:yutDramaExit .3s forwards;}
@keyframes yutDramaExit{to{transform:scale(1.5);opacity:0}}
.yut-drama-sticks{display:flex;gap:12px;justify-content:center;margin-bottom:16px;}
.yut-drama-stick{
  width:30px;height:100px;border-radius:15px;
  box-shadow:0 6px 20px rgba(0,0,0,.3);
  animation:stickLand .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes stickLand{0%{transform:translateY(-100px) rotate(0deg);opacity:0}60%{transform:translateY(10px) rotate(720deg)}100%{transform:translateY(0) rotate(720deg);opacity:1}}
.yut-drama-stick:nth-child(1){animation-delay:0s}
.yut-drama-stick:nth-child(2){animation-delay:.1s}
.yut-drama-stick:nth-child(3){animation-delay:.2s}
.yut-drama-stick:nth-child(4){animation-delay:.3s}
.yut-drama-stick.flat{background:linear-gradient(180deg,#c8804a,#a06030,#c0784a);border:2px solid #804020;}
.yut-drama-stick.round{background:linear-gradient(180deg,#f0d898,#d8a848,#ecca80);border:2px solid #b07828;}
.yut-drama-stick.baek{background:linear-gradient(180deg,#c8804a,#a06030,#c0784a);border:3px solid #e00;}
.yut-drama-name{
  font-family:'Jua',sans-serif;font-size:clamp(48px,12vw,80px);
  color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.3),0 0 40px currentColor;
  -webkit-text-stroke:2px rgba(0,0,0,.2);
  animation:yutNamePulse .5s infinite alternate;
}
@keyframes yutNamePulse{0%{transform:scale(1)}100%{transform:scale(1.05)}}
.yut-drama-desc{font-family:'Jua',sans-serif;font-size:20px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.5);margin-top:8px;}
.yut-drama-bg{position:fixed;inset:0;z-index:-1;opacity:.9;}

/* ═══ EVENT DRAMA ═══ */
.event-drama{
  display:none;position:fixed;inset:0;z-index:280;
  align-items:center;justify-content:center;pointer-events:none;
}
.event-drama.show{display:flex;}
.event-drama-inner{text-align:center;animation:eventPop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes eventPop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.event-drama-inner.exit{animation:eventExit .4s forwards;}
@keyframes eventExit{to{transform:scale(1.5) rotate(10deg);opacity:0}}
.event-drama-emoji{font-size:clamp(60px,15vw,100px);animation:emojiWiggle .3s infinite alternate;}
@keyframes emojiWiggle{0%{transform:rotate(-8deg)}100%{transform:rotate(8deg)}}
.event-drama-title{font-family:'Jua',sans-serif;font-size:clamp(36px,10vw,64px);color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.4),0 0 50px currentColor;margin-top:12px;}
.event-drama-sub{font-family:'Jua',sans-serif;font-size:clamp(16px,4vw,24px);color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.5);margin-top:8px;}
.event-drama-bg{position:fixed;inset:0;z-index:-1;}

/* Flash & particles */
.flash-overlay{position:fixed;inset:0;z-index:200;pointer-events:none;opacity:0;transition:opacity .08s;}
.flash-overlay.flash{opacity:.8;transition:none;}
.cbox{position:fixed;inset:0;pointer-events:none;z-index:999;}
.cp{position:absolute;animation:cpFall linear forwards;}
@keyframes cpFall{0%{transform:translateY(-10px);opacity:1}100%{transform:translateY(105vh) rotate(800deg);opacity:0}}
@keyframes pulseRing{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.18);opacity:.15}}

/* Sparkle effect */
.sparkle{position:fixed;pointer-events:none;z-index:210;}
.sparkle-particle{
  position:absolute;width:10px;height:10px;
  background:radial-gradient(circle,#fff,#ffd700);
  border-radius:50%;
  animation:sparkleFly 1s ease-out forwards;
}
@keyframes sparkleFly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}

/* Connection status */
.conn-status{position:fixed;top:10px;right:10px;padding:6px 12px;border-radius:20px;font-size:11px;font-family:'Jua',sans-serif;z-index:50;}
.conn-status.online{background:#d4edda;color:#155724;}
.conn-status.offline{background:#f8d7da;color:#721c24;}
</style>
</head>
<body>

<div class="conn-status online" id="connStatus">🟢 연결됨</div>

<h1>🔑 동아의 디코드 찾기</h1>
<p class="sub">비밀 코드를 찾아 먼저 골인하세요! 🎯</p>

<!-- ── LOBBY SCREEN ── -->
<div id="lobbyScreen">
  <div class="lobby-panel">
    <div class="lobby-title">🎮 게임 참여하기</div>
    <input type="text" class="lobby-input" id="myNameInput" placeholder="내 이름 입력 (최대 6자)" maxlength="6">
    <button class="btn-lobby" onclick="createRoom()" id="btnCreate">🎲 새 게임 만들기</button>
    <div class="divider">또는</div>
    <input type="text" class="lobby-input room-code" id="roomCodeInput" placeholder="방 코드 입력" maxlength="6">
    <button class="btn-lobby secondary" onclick="joinRoom()" id="btnJoin">🚪 게임 참여하기</button>
    <div class="error-msg" id="lobbyError"></div>
  </div>
</div>

<!-- ── WAITING ROOM ── -->
<div id="waitingScreen" style="display:none;width:100%;max-width:500px;">
  <div class="lobby-panel">
    <div class="lobby-title">⏳ 대기실</div>
    <div class="room-info">
      <div class="room-code-label">방 코드</div>
      <div class="room-code-display" id="displayRoomCode">----</div>
      <button class="copy-btn" onclick="copyRoomCode()">📋 코드 복사</button>
    </div>
    <div class="player-wait-list" id="waitingPlayerList"></div>
    <div class="waiting-msg" id="waitingMsg">다른 플레이어를 기다리는 중...</div>
    <button class="btn-lobby" onclick="startGameAsHost()" id="btnStartGame" disabled>🔑 게임 시작 (최소 2명)</button>
    <button class="btn-lobby secondary" onclick="leaveRoom()" style="margin-top:8px;">🚪 나가기</button>
  </div>
</div>

<!-- ── PIECE SELECT SCREEN ── -->
<div id="setupScreen">
  <div class="setup-panel">
    <div class="setup-title">🎯 내 말 선택하기</div>
    <div class="piece-grid" id="pieceGrid"></div>
    <div class="player-slots" id="playerSlots"></div>
    <button class="btn-confirm" id="btnReady" onclick="confirmPiece()" disabled>✅ 준비 완료!</button>
  </div>
</div>

<!-- ── GAME SCREEN ── -->
<div id="gameScreen">

// ═══════════════════════════════════════
// BOARD GEOMETRY WITH SHORTCUTS
// ═══════════════════════════════════════
const W=500,H=500,PAD=52,CX=250,CY=250;
const OUTER=[];
(function(){
  for(let i=0;i<20;i++){
    const side=Math.floor(i/5),t=(i%5)/4;
    const L=PAD,R=W-PAD,T=PAD,B=H-PAD;
    let x,y;
    if(side===0){x=R;y=B-t*(B-T);}
    else if(side===1){x=R-t*(R-L);y=T;}
    else if(side===2){x=L;y=T+t*(B-T);}
    else{x=L+t*(R-L);y=B;}
    OUTER.push({x,y});
  }
})();
const INNER={
  20:{x:CX,y:CY},         // 중앙
  21:{x:(W-PAD+CX)/2,y:(H-PAD+CY)/2},  // 우하 대각
  22:{x:(PAD+CX)/2,y:(H-PAD+CY)/2},    // 좌하 대각
  23:{x:(PAD+CX)/2,y:(PAD+CY)/2},      // 좌상 대각
  24:{x:(W-PAD+CX)/2,y:(PAD+CY)/2},    // 우상 대각
};
function nodeXY(n){return n<20?OUTER[n]:INNER[n]||{x:CX,y:CY};}

// 지름길 경로 정의
// 동(5) → 21 → 20 → 22 → 15(서) 또는 23 → 10(북)
// 북(10) → 23 → 20 → 24 → 5(동) 또는 22 → 15(서)  
// 서(15) → 22 → 20 → 24 → 5(동) 또는 21 → 0(출발)
const SHORTCUT_PATHS = {
  5:  { outer: [6,7,8,9,10], inner: [21,20,22,15] },   // 동 → 서
  10: { outer: [11,12,13,14,15], inner: [23,20,22,15] }, // 북 → 서  
  15: { outer: [16,17,18,19,0], inner: [22,20,21,0] },  // 서 → 출발

function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0; i<4; i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

function generatePlayerId() {
  return 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
}

// ═══════════════════════════════════════
// LOBBY - CREATE/JOIN ROOM
// ═══════════════════════════════════════
async function createRoom() {
  myName = document.getElementById('myNameInput').value.trim();
  if(!myName) { showError('이름을 입력해 주세요!'); return; }
  if(myName.length > 6) { showError('이름은 6자 이내로!'); return; }

  myPlayerId = generatePlayerId();
  currentRoomCode = generateRoomCode();
  isHost = true;

  roomRef = db.ref('rooms/' + currentRoomCode);

  const snapshot = await roomRef.once('value');
  if(snapshot.exists()) {
    currentRoomCode = generateRoomCode();
    roomRef = db.ref('rooms/' + currentRoomCode);
  }

  await roomRef.set({
    host: myPlayerId,
    status: 'waiting',
    players: {
      [myPlayerId]: {
        name: myName,
        joinedAt: Date.now(),
        pieceId: null,
        ready: false,
        position: { node: 0, path: 'outer' },
        finished: false
      }
    },
    gameData: {
      turnPlayerId: null,
      lastAction: null,
      pendingBonus: false,
      cardData: null
    },
    createdAt: firebase.database.ServerValue.TIMESTAMP
  });

  roomRef.onDisconnect().remove();

  setupRoomListeners();
  showScreen('waitingScreen');
  document.getElementById('displayRoomCode').textContent = currentRoomCode;
}

async function joinRoom() {
  myName = document.getElementById('myNameInput').value.trim();
  if(!myName) { showError('이름을 입력해 주세요!'); return; }

  const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
  if(!code || code.length < 4) { showError('방 코드를 입력해 주세요!'); return; }

  roomRef = db.ref('rooms/' + code);
  const snapshot = await roomRef.once('value');

  if(!snapshot.exists()) { showError('존재하지 않는 방입니다!'); return; }

  const roomData = snapshot.val();
  if(roomData.status !== 'waiting') { showError('이미 게임이 시작된 방입니다!'); return; }

  const playerCount = Object.keys(roomData.players || {}).length;
  if(playerCount >= 6) { showError('방이 가득 찼습니다!'); return; }

  myPlayerId = generatePlayerId();
  currentRoomCode = code;
  isHost = false;

  await roomRef.child('players/' + myPlayerId).set({
    name: myName,
    joinedAt: firebase.database.ServerValue.TIMESTAMP,
    pieceId: null,
    ready: false,
    position: { node: 0, path: 'outer' },
    finished: false
  });

  roomRef.child('players/' + myPlayerId).onDisconnect().remove();

  setupRoomListeners();
  showScreen('waitingScreen');
  document.getElementById('displayRoomCode').textContent = currentRoomCode;
}

// ═══════════════════════════════════════
// ROOM LISTENERS
// ═══════════════════════════════════════
let lastTurnPlayerId = null;

function setupRoomListeners() {
  localListeners.forEach(l => l());
  localListeners = [];

  const roomListener = roomRef.on('value', snapshot => {
    if(!snapshot.exists()) {
      alert('방이 종료되었습니다!');
      resetToLobby();
      return;
    }

    const prevState = gameState;
    gameState = snapshot.val();

    // Check for turn change
    const gd = gameState.gameData || {};
    if(gameState.status === 'playing' && gd.turnPlayerId && gd.turnPlayerId !== lastTurnPlayerId) {
      const player = gameState.players[gd.turnPlayerId];
      const piece = PIECE_DEFS.find(d => d.id === player?.pieceId);
      showTurnNotify(player, piece);
      lastTurnPlayerId = gd.turnPlayerId;
    }

    updateUI();
  });
  localListeners.push(() => roomRef.off('value', roomListener));
}

function updateUI() {
  if(!gameState) return;

  const status = gameState.status;

  if(status === 'waiting') {
    renderWaitingRoom();
  } else if(status === 'selecting') {
    showScreen('setupScreen');
    renderPieceSelection();
  } else if(status === 'playing' || status === 'finished') {
    showScreen('gameScreen');
    document.getElementById('gameRoomCode').textContent = currentRoomCode;
    renderGame();
  }
}

// ═══════════════════════════════════════
// WAITING ROOM

function renderWaitingRoom() {
  showScreen('waitingScreen');

  const players = gameState.players || {};
  const playerList = document.getElementById('waitingPlayerList');
  const playerArr = Object.entries(players);

  playerList.innerHTML = playerArr.map(([pid, p]) => `
    <div class="player-wait-item ${pid===myPlayerId?'me':''}">
      <span class="pwi-emoji">👤</span>
      <span class="pwi-name">${p.name}${pid===myPlayerId?' (나)':''}</span>
      ${pid===gameState.host?'<span class="pwi-host">방장</span>':''}
    </div>
  `).join('');

  const count = playerArr.length;
  document.getElementById('waitingMsg').textContent = 
    count < 2 ? `${count}/6명 - 최소 2명이 필요해요!` : `${count}/6명 - 게임 시작 가능!`;

  const startBtn = document.getElementById('btnStartGame');
  startBtn.disabled = !isHost || count < 2;
  startBtn.textContent = isHost ? '🔑 게임 시작!' : '방장이 시작할 때까지 대기 중...';
}

// ═══════════════════════════════════════
// PIECE SELECTION
// ═══════════════════════════════════════
function renderPieceSelection() {
  const players = gameState.players || {};
  const takenPieces = new Set();
  Object.values(players).forEach(p => { if(p.pieceId) takenPieces.add(p.pieceId); });

  const myData = players[myPlayerId];
  const myPiece = myData?.pieceId;

  const grid = document.getElementById('pieceGrid');
  grid.innerHTML = PIECE_DEFS.map(p => {
    const taken = takenPieces.has(p.id) && p.id !== myPiece;
    const selected = p.id === selectedPiece || p.id === myPiece;
    return `
      <div class="piece-btn ${taken?'taken':''} ${selected?'selected':''}" onclick="selectPieceLocal('${p.id}')">
        <span class="piece-emoji">${p.emoji}</span>
        <div class="piece-name">${p.name}</div>
      </div>`;
  }).join('');

  const slots = document.getElementById('playerSlots');
  slots.innerHTML = Object.entries(players).map(([pid, p]) => {
    const piece = PIECE_DEFS.find(d => d.id === p.pieceId);
    return `
      <div class="slot ${pid===myPlayerId?'me':''}">
        <span class="slot-emoji">${piece?.emoji||'❓'}</span>
        <span class="slot-name">${p.name}${pid===myPlayerId?' (나)':''}</span>
        <span class="slot-ready ${p.ready?'yes':'no'}">${p.ready?'준비완료':'선택중'}</span>
      </div>`;
  }).join('');

  const btn = document.getElementById('btnReady');
  if(myData?.ready) {
    btn.textContent = '⏳ 다른 플레이어 대기 중...';
    btn.disabled = true;
  } else {
    btn.textContent = '✅ 준비 완료!';
    btn.disabled = !selectedPiece && !myPiece;
  }

  const allReady = Object.values(players).every(p => p.ready);
  if(allReady && isHost && Object.keys(players).length >= 2) {
    startPlaying();
  }
}

function selectPieceLocal(pieceId) {
  const players = gameState.players || {};
  const takenPieces = new Set();
  Object.entries(players).forEach(([pid, p]) => {
    if(p.pieceId && pid !== myPlayerId) takenPieces.add(p.pieceId);
  });

  if(takenPieces.has(pieceId)) return;
  if(players[myPlayerId]?.ready) return;

  selectedPiece = pieceId;
  renderPieceSelection();
}

async function confirmPiece() {
  if(!selectedPiece) return;

  await roomRef.child('players/' + myPlayerId).update({
    pieceId: selectedPiece,
    ready: true
  });
}

async function startPlaying() {
  const players = gameState.players || {};
  const playerIds = Object.keys(players);

  await roomRef.update({
    status: 'playing',
    'gameData/turnPlayerId': playerIds[0]
  });
}

function renderGame() {
  const players = gameState.players || {};
  const gd = gameState.gameData || {};
  const turnPlayerId = gd.turnPlayerId;
  const isMyTurn = turnPlayerId === myPlayerId;

  const turnPlayer = players[turnPlayerId];
  const turnPiece = PIECE_DEFS.find(d => d.id === turnPlayer?.pieceId);
  document.getElementById('turnTxt').innerHTML = turnPlayer 
    ? `<span class="turn-name">${turnPiece?.emoji||''} ${turnPlayer.name}</span>${turnPlayerId===myPlayerId?' (내 차례!)':' 님의 차례'}`
    : '준비 중...';

  const yutStage = document.getElementById('yutStage');
  if(isMyTurn && gameState.status === 'playing' && !animatingMove) {
    yutStage.classList.remove('disabled');
    yutStage.onmousedown = e => startCharge(e);
    yutStage.ontouchstart = e => startCharge(e);
    yutStage.onmouseup = () => throwYut();
    yutStage.ontouchend = () => throwYut();
    yutStage.onmouseleave = () => cancelCharge();
  } else {
    yutStage.classList.add('disabled');
    yutStage.onmousedown = null;
    yutStage.ontouchstart = null;
    yutStage.onmouseup = null;
    yutStage.ontouchend = null;
  }

  // Card overlay
  if(gd.cardData && gd.cardData.playerId === myPlayerId && !gd.cardData.chosen) {
    showCardOverlay(gd.cardData);
  } else {
    document.getElementById('cardOverlay').classList.remove('show');
  }

  // Winner
  if(gameState.status === 'finished' && gd.winnerId) {
    const winner = players[gd.winnerId];
    const winPiece = PIECE_DEFS.find(d => d.id === winner?.pieceId);
    document.getElementById('winnerName').textContent = (winPiece?.emoji||'') + ' ' + (winner?.name||'');
    document.getElementById('winnerBox').classList.add('show');
    confetti();
  } else {
    document.getElementById('winnerBox').classList.remove('show');
  }

  renderBoard();
  renderPlayerListBottom();
}

let chargeInterval = null;
let chargeLevel = 0;
let throwing = false;

function startCharge(e) {
  if(e) e.preventDefault();
  if(throwing || animatingMove) return;

  chargeLevel = 0;
  const t0 = Date.now();
  chargeInterval = setInterval(() => {
    chargeLevel = Math.min(100, (Date.now()-t0)/20);
    document.getElementById('powerBar').style.width = chargeLevel + '%';
  }, 30);

  document.getElementById('throwHint').style.display = 'none';
  document.getElementById('stickDisplay').innerHTML = '';
  document.getElementById('yutNameDisplay').textContent = '';
}

function cancelCharge() {
  if(chargeInterval) {
    clearInterval(chargeInterval);
    chargeInterval = null;
  }
  document.getElementById('powerBar').style.width = '0%';
  document.getElementById('throwHint').style.display = 'flex';
}

async function throwYut() {
  if(!chargeInterval || throwing || animatingMove) return;
  clearInterval(chargeInterval);
  chargeInterval = null;
  throwing = true;

  document.getElementById('powerBar').style.width = '0%';

  const outcome = rollOutcome();

  // Show dramatic result first
  showYutDrama(outcome, 2000);

  // Wait for drama, then process
  setTimeout(async () => {
    await processMove(outcome);
    throwing = false;
  }, 2200);
}

const YUT_OUTCOMES = [
  {name:'백도', kor:'1칸 뒤로!', steps:-1, bonus:false, sticks:[true,false,false,false], baek:true},
  {name:'도',   kor:'1칸 전진!', steps:1, bonus:false, sticks:[true,false,false,false]},
  {name:'개',   kor:'2칸 전진!', steps:2, bonus:false, sticks:[true,true,false,false]},
  {name:'걸',   kor:'3칸 전진!', steps:3, bonus:false, sticks:[true,true,true,false]},
  {name:'윷',   kor:'4칸 + 한번 더!', steps:4, bonus:true, sticks:[false,false,false,false]},
  {name:'모',   kor:'5칸 + 한번 더!', steps:5, bonus:true, sticks:[true,true,true,true]},
];
const YUT_W = [5,25,25,22,12,11];

function rollOutcome() {
  const total = YUT_W.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for(let i=0; i<YUT_W.length; i++) {
    r -= YUT_W[i];
    if(r <= 0) return YUT_OUTCOMES[i];
  }
  return YUT_OUTCOMES[1];
}

// ═══════════════════════════════════════
// MOVE PROCESSING WITH ANIMATION
// ═══════════════════════════════════════
async function processMove(outcome) {
  const players = gameState.players || {};
  const myData = players[myPlayerId];
  const pos = myData.position || { node: 0, path: 'outer' };

  // Calculate path and new position
  const moveResult = calculateMove(pos, outcome.steps);

  // Check if shortcut choice needed
  if(moveResult.needsShortcutChoice) {
    pendingShortcutChoice = { outcome, moveResult };
    document.getElementById('shortcutOverlay').classList.add('show');
    return;
  }

  await executeMove(outcome, moveResult);
}

function calculateMove(pos, steps) {
  let currentNode = pos.node;
  let path = pos.path || 'outer';
  let needsShortcutChoice = false;
  let passedCorner = null;

  if(steps < 0) {
    // Backward movement
    if(path === 'outer') {
      currentNode = Math.max(0, currentNode + steps);
    } else {
      currentNode = Math.max(0, currentNode + steps);
    }
    return { node: currentNode, path, finished: false, pathNodes: [currentNode] };
  }

  // Forward movement
  const pathNodes = [currentNode];

  for(let i=0; i<steps; i++) {
    if(path === 'outer') {
      currentNode++;
      if(currentNode >= 20) {
        return { node: 0, path: 'outer', finished: true, pathNodes };
      }
      pathNodes.push(currentNode);

      // Check if landing on corner (shortcut available)
      if(i === steps - 1 && CORNER_NODES.has(currentNode) && currentNode !== 0) {
        needsShortcutChoice = true;
        passedCorner = currentNode;
      }
    } else {
      // Inner path logic (simplified)
      currentNode++;
      if(currentNode >= 20) {
        return { node: 0, path: 'outer', finished: true, pathNodes };
      }
      pathNodes.push(currentNode);
    }
  }

  return { node: currentNode, path, finished: false, needsShortcutChoice, passedCorner, pathNodes };
}

async function chooseShortcut(takeShortcut) {
  document.getElementById('shortcutOverlay').classList.remove('show');

  if(!pendingShortcutChoice) return;

  const { outcome, moveResult } = pendingShortcutChoice;
  moveResult.takeShortcut = takeShortcut;
  moveResult.needsShortcutChoice = false;

  if(takeShortcut) {
    moveResult.path = 'inner';
  }

  pendingShortcutChoice = null;
  await executeMove(outcome, moveResult);
}

async function executeMove(outcome, moveResult) {
  const players = gameState.players || {};
  const myData = players[myPlayerId];

  animatingMove = true;

  // Animate piece movement
  await animatePieceAlongPath(myData, moveResult.pathNodes);

  const newNode = moveResult.node;
  const finished = moveResult.finished;

  // Check catch
  const caught = [];
  if(!finished && newNode !== 0) {
    Object.entries(players).forEach(([pid, p]) => {
      if(pid === myPlayerId || p.finished) return;
      const pNode = p.position?.node || 0;
      if(pNode === newNode) {
        caught.push({pid, name: p.name, pieceId: p.pieceId});
      }
    });
  }

  // Check card node
  const isCardNode = !finished && CARD_NODES.has(newNode);

  // Build updates
  const updates = {};
  updates[`players/${myPlayerId}/position`] = { node: newNode, path: moveResult.path };
  updates[`players/${myPlayerId}/finished`] = finished;

  caught.forEach(c => {
    updates[`players/${c.pid}/position`] = { node: 0, path: 'outer' };
  });

  if(isCardNode) {
    const cards = shuffleCards();
    updates['gameData/cardData'] = {
      playerId: myPlayerId,
      cards: cards,
      isBonus: outcome.bonus,
      chosen: false
    };
    showEventDrama('card', '카드를 선택하세요!', 1500);
  }

  if(caught.length) {
    showEventDrama('catch', caught.map(c=>c.name).join(', ')+' 잡았어요!', 1800);
  }

  if(finished) {
    updates['status'] = 'finished';
    updates['gameData/winnerId'] = myPlayerId;
    setTimeout(() => showEventDrama('goal', myName+' 우승!', 2500), 500);
  }

  // Handle bonus or next turn
  if(!finished && !isCardNode) {
    if(outcome.bonus) {
      showEventDrama('bonus', '한 번 더 던지세요!', 1500);
      updates['gameData/pendingBonus'] = true;
    } else {
      // Auto next turn
      const playerIds = Object.keys(players).filter(pid => !players[pid].finished);
      const curIdx = playerIds.indexOf(myPlayerId);
      const nextIdx = (curIdx + 1) % playerIds.length;
      updates['gameData/turnPlayerId'] = playerIds[nextIdx];
      updates['gameData/pendingBonus'] = false;
    }
  }

  await roomRef.update(updates);
  animatingMove = false;
}

// ═══════════════════════════════════════
// PIECE MOVEMENT ANIMATION
// ═══════════════════════════════════════
function animatePieceAlongPath(player, pathNodes) {
  return new Promise(resolve => {
    if(pathNodes.length <= 1) { resolve(); return; }

    const svg = document.getElementById('boardSvg');
    const ns = 'http://www.w3.org/2000/svg';
    const piece = PIECE_DEFS.find(d => d.id === player.pieceId);
    if(!piece) { resolve(); return; }

    // Create animated piece
    const group = document.createElementNS(ns, 'g');
    group.setAttribute('class', 'animated-piece');

    const circle = document.createElementNS(ns, 'circle');
    circle.setAttribute('r', '24');
    circle.setAttribute('fill', piece.color);
    circle.setAttribute('stroke', 'white');
    circle.setAttribute('stroke-width', '3');
    circle.setAttribute('filter', 'drop-shadow(0 4px 8px rgba(0,0,0,0.3))');

    const text = document.createElementNS(ns, 'text');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('font-size', '24');
    text.setAttribute('dy', '8');
    text.textContent = piece.emoji;

    group.appendChild(circle);
    group.appendChild(text);
    svg.appendChild(group);

    const startPos = nodeXY(pathNodes[0]);
    group.setAttribute('transform', `translate(${startPos.x}, ${startPos.y})`);

    let step = 0;
    const stepDuration = 300;

    function animateStep() {
      if(step >= pathNodes.length - 1) {
        group.remove();
        resolve();
        return;
      }

      const from = nodeXY(pathNodes[step]);
      const to = nodeXY(pathNodes[step + 1]);
      const startTime = performance.now();

      function animate(now) {
        const t = Math.min((now - startTime) / stepDuration, 1);
        const ease = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;

        const x = from.x + (to.x - from.x) * ease;
        const y = from.y + (to.y - from.y) * ease;
        const bounce = Math.sin(t * Math.PI) * 15;

        group.setAttribute('transform', `translate(${x}, ${y - bounce})`);

        if(t < 1) {
          requestAnimationFrame(animate);
        } else {
          step++;
          setTimeout(animateStep, 50);
        }
      }
      requestAnimationFrame(animate);
    }

    animateStep();
  });
}

const CARDS = [
  {id:'back1', icon:'⬅️', title:'뒤로 한 칸!', desc:'한 칸 후퇴', effect:-1},
  {id:'again', icon:'🔄', title:'한 번 더!', desc:'다시 던지기', effect:'again'},
  {id:'forward1', icon:'➡️', title:'앞으로 한 칸!', desc:'한 칸 전진', effect:1},
  {id:'forward2', icon:'⏩', title:'앞으로 두 칸!', desc:'두 칸 전진', effect:2},
  {id:'reset', icon:'🏠', title:'처음으로!', desc:'출발점 이동', effect:'reset'},
];

function shuffleCards() {
  return [...CARDS].sort(() => Math.random()-.5).slice(0,3);
}

function showCardOverlay(cardData) {
  const container = document.getElementById('cardChoices');
  const players = gameState.players || {};
  const player = players[cardData.playerId];

      <span class="cc-icon">${card.icon}</span>
      <div class="cc-title">${card.title}</div>
      <div class="cc-desc">${card.desc}</div>
    </div>
  `).join('');

  document.getElementById('cardOverlay').classList.add('show');
}

async function revealCard(idx) {
  const gd = gameState.gameData || {};
  const cardData = gd.cardData;
  if(!cardData || cardData.playerId !== myPlayerId) return;

  const card = cardData.cards[idx];
  const el = document.getElementById('cc-'+idx);
  if(!el || !el.classList.contains('face-down')) return;

  el.classList.remove('face-down');
  [0,1,2].forEach(i => {
    if(i !== idx) {
      const o = document.getElementById('cc-'+i);
      if(o) o.classList.add('disabled');
    }
  });

  setTimeout(async () => {
    document.getElementById('cardOverlay').classList.remove('show');

    const players = gameState.players || {};
    const myData = players[myPlayerId];
    const pos = myData.position || { node: 0, path: 'outer' };
    let newNode = pos.node;
    let newPath = pos.path;

    if(card.effect === 'reset') {
      newNode = 0;
      newPath = 'outer';
    } else if(card.effect === 'again') {
      await roomRef.child('gameData').update({
        cardData: null,
        pendingBonus: true
      });
      showEventDrama('bonus', '한 번 더 던지세요!', 1500);
      return;
    } else {
      newNode = Math.max(0, Math.min(19, newNode + card.effect));
    }

    // Check catch
    const caught = [];
    Object.entries(players).forEach(([pid, p]) => {
      if(pid === myPlayerId || p.finished) return;
      if((p.position?.node || 0) === newNode && newNode !== 0) {
        caught.push({pid, name: p.name, pieceId: p.pieceId});
      }
    });

    const updates = {};
    updates[`players/${myPlayerId}/position`] = { node: newNode, path: newPath };
    caught.forEach(c => {
      updates[`players/${c.pid}/position`] = { node: 0, path: 'outer' };
    });
    updates['gameData/cardData'] = null;

    if(cardData.isBonus) {
      updates['gameData/pendingBonus'] = true;
      showEventDrama('bonus', '한 번 더 던지세요!', 1500);
    } else {
      const playerIds = Object.keys(players).filter(pid => !players[pid].finished);
      const curIdx = playerIds.indexOf(myPlayerId);
      const nextIdx = (curIdx + 1) % playerIds.length;
      updates['gameData/turnPlayerId'] = playerIds[nextIdx];
      updates['gameData/pendingBonus'] = false;
    }

    if(caught.length) {
      showEventDrama('catch', caught.map(c=>c.name).join(', ')+' 잡았어요!', 1800);
    }

    await roomRef.update(updates);
  }, 900);
}

// ═══════════════════════════════════════
function renderBoard() {
  const svg = document.getElementById('boardSvg');
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  function el(tag, attrs, txt) {
    const e = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
    if(txt != null) e.textContent = txt;
    return e;
  }

  // Background
  svg.appendChild(el('rect',{x:0,y:0,width:500,height:500,fill:'#fdf6e8',rx:14}));
  svg.appendChild(el('rect',{x:4,y:4,width:492,height:492,fill:'none',stroke:'#d4b886','stroke-width':2.5,rx:12,'stroke-dasharray':'8,5'}));

  // Outer lines
  for(let i=0;i<20;i++){
    const a=OUTER[i],b=OUTER[(i+1)%20];
    svg.appendChild(el('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#c8a878','stroke-width':3,'stroke-dasharray':'6,4'}));
  }

  // Diagonal lines
  [[0,21],[21,20],[20,23],[23,10],[5,24],[24,20],[20,22],[22,15]].forEach(([a,b])=>{
    const p1=a<20?OUTER[a]:INNER[a],p2=b<20?OUTER[b]:INNER[b];
    svg.appendChild(el('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:'#b8986a','stroke-width':2.5,'stroke-dasharray':'5,4'}));
  });

  // Outer nodes
  for(let i=0;i<20;i++){
    const p=OUTER[i];
    const isHome=i===0, isCorner=CORNER_NODES.has(i)&&i!==0, isCard=CARD_NODES.has(i);
    const r=isHome?30:isCorner?24:isCard?32:16;
    let fill='white',stroke='#c8a878',sw=2;

    if(isHome){fill='#4caf6e';stroke='#2e7d32';sw=4;}
    else if(isCard){fill='#e8daff';stroke='#6c5ce7';sw=3;}
    else if(isCorner){fill='#fdf0d8';stroke='#b8864e';sw=3;}

    svg.appendChild(el('circle',{cx:p.x,cy:p.y,r,fill,stroke,'stroke-width':sw}));

    if(isCard){
      svg.appendChild(el('circle',{cx:p.x,cy:p.y,r:r+6,fill:'none',stroke:'#a29bfe','stroke-width':2,opacity:'0.5'}));
      svg.appendChild(el('circle',{cx:p.x,cy:p.y,r:r+12,fill:'none',stroke:'#a29bfe','stroke-width':1,opacity:'0.3'}));
    }

    if(isHome){
      svg.appendChild(el('text',{x:p.x,y:p.y-40,'text-anchor':'middle','font-family':'Jua','font-size':14,fill:'#2e7d32'},'🏁 출발/골인'));
      svg.appendChild(el('text',{x:p.x,y:p.y+7,'text-anchor':'middle','font-family':'Jua','font-size':15,fill:'white'},'HOME'));
    } else if(isCard){
      svg.appendChild(el('text',{x:p.x,y:p.y+8,'text-anchor':'middle','font-size':36},'🔮'));
    } else if(isCorner){
      const lbl={5:'동',10:'북',15:'서'};
      svg.appendChild(el('text',{x:p.x,y:p.y-28,'text-anchor':'middle','font-family':'Jua','font-size':11,fill:'#b8864e'},'⭐지름길'));
      svg.appendChild(el('text',{x:p.x,y:p.y+6,'text-anchor':'middle','font-family':'Jua','font-size':14,fill:'#7a5230'},lbl[i]));
    } else {
      svg.appendChild(el('text',{x:p.x,y:p.y+5,'text-anchor':'middle','font-family':'Jua','font-size':11,fill:'#a08060'},i));
    }
  }

  // Inner nodes
  Object.entries(INNER).forEach(([id,p])=>{
    const nid=parseInt(id);
    const isCenter=nid===20;
    const isCard=CARD_NODES.has(nid);
    const r=isCenter?30:16;
    const fill=isCenter||isCard?'#e8daff':'#fdf0d8';
    const stroke=isCenter||isCard?'#6c5ce7':'#b8864e';

    svg.appendChild(el('circle',{cx:p.x,cy:p.y,r,fill,stroke,'stroke-width':isCenter?4:2}));

    if(isCenter){
      svg.appendChild(el('circle',{cx:p.x,cy:p.y,r:r+8,fill:'none',stroke:'#a29bfe','stroke-width':2,opacity:'0.5'}));
      svg.appendChild(el('text',{x:p.x,y:p.y+10,'text-anchor':'middle','font-size':40},'🔮'));
    }
  });

  // Players
  const players = gameState?.players || {};
  const gd = gameState?.gameData || {};
  const byNode = {};

  Object.entries(players).forEach(([pid, p]) => {
    if(p.finished) return;
    const node = p.position?.node || 0;
    if(!byNode[node]) byNode[node] = [];
    byNode[node].push({...p, oddy: pid});
  });

  Object.entries(byNode).forEach(([nodeStr, plist]) => {
    const node = parseInt(nodeStr);
    const base = node<20 ? OUTER[node] : INNER[node] || {x:CX,y:CY};
    const n = plist.length;

    plist.forEach((p, k) => {
      const piece = PIECE_DEFS.find(d => d.id === p.pieceId);
      if(!piece) return;

      const angle = n>1 ? (k/n)*Math.PI*2-Math.PI/2 : 0;
      const dist = n>1 ? 20 : 0;
      const px = base.x + Math.cos(angle)*dist;
      const py = base.y + Math.sin(angle)*dist;
      const R = 22;
      const isActive = p.oddy === gd.turnPlayerId;

      if(isActive && gameState.status === 'playing') {
        const ring = el('circle',{cx:px,cy:py,r:R+10,fill:'none',stroke:piece.color,'stroke-width':3,opacity:'0.5'});
        ring.style.animation = 'pulseRing 1s infinite';
        svg.appendChild(ring);
      }

      svg.appendChild(el('ellipse',{cx:px+2,cy:py+R-2,rx:R-3,ry:7,fill:'rgba(0,0,0,0.25)'}));
      svg.appendChild(el('circle',{cx:px,cy:py,r:R,fill:piece.color,stroke:'white','stroke-width':3}));
      svg.appendChild(el('text',{x:px,y:py+8,'text-anchor':'middle','font-size':24},piece.emoji));
      svg.appendChild(el('text',{x:px,y:py+R+14,'text-anchor':'middle','font-family':'Jua','font-size':11,fill:piece.color,'font-weight':'bold'},p.name));
    });
  });
}

function renderPlayerListBottom() {
  const el = document.getElementById('playerListBottom');
  const players = gameState?.players || {};
  const gd = gameState?.gameData || {};

  el.innerHTML = Object.entries(players).map(([pid, p]) => {
    const piece = PIECE_DEFS.find(d => d.id === p.pieceId);
    const isActive = pid === gd.turnPlayerId;
    const isMe = pid === myPlayerId;
    const node = p.position?.node || 0;
    return `
      <div class="p-card ${isActive?'active':''} ${p.finished?'finished':''} ${isMe?'me':''}">
        <div class="p-emoji-big">${piece?.emoji||'❓'}</div>
        <div class="p-info">
          <div class="p-name">${p.name}${isMe?' (나)':''}${p.finished?' 🏆':''}</div>
          <div class="p-pos">${p.finished?'완주!':node===0?'출발 전':`${node}번째 칸`}</div>
        </div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// RESTART & LEAVE
// ═══════════════════════════════════════
async function restartGame() {
  if(!isHost) return;

  const players = gameState.players || {};
  const updates = { status: 'playing' };
  updates['gameData/turnPlayerId'] = Object.keys(players)[0];
  updates['gameData/lastAction'] = null;
  updates['gameData/pendingBonus'] = false;
  updates['gameData/cardData'] = null;
  updates['gameData/winnerId'] = null;

  Object.keys(players).forEach(pid => {
    updates[`players/${pid}/position`] = { node: 0, path: 'outer' };
    updates[`players/${pid}/finished`] = false;
  });

  await roomRef.update(updates);
  document.getElementById('winnerBox').classList.remove('show');
  lastTurnPlayerId = null;
}

async function leaveRoom() {
  if(roomRef && myPlayerId) {
    await roomRef.child('players/' + myPlayerId).remove();
    if(isHost) await roomRef.remove();
  }
  resetToLobby();
}

function resetToLobby() {
  localListeners.forEach(l => l());
  localListeners = [];
  roomRef = null;
  gameState = null;
  currentRoomCode = null;
  myPlayerId = null;
  isHost = false;
  selectedPiece = null;
  throwing = false;
  animatingMove = false;
  lastTurnPlayerId = null;

  document.getElementById('winnerBox').classList.remove('show');
  document.getElementById('cardOverlay').classList.remove('show');
  document.getElementById('shortcutOverlay').classList.remove('show');
  document.getElementById('stickDisplay').innerHTML = '';
  document.getElementById('yutNameDisplay').textContent = '';

  showScreen('lobbyScreen');
}

showScreen('lobbyScreen');
</script>
